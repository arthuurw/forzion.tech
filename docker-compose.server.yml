services:
  backend:
    image: ${REGISTRY}/forzion/backend:${TAG:-latest}
    environment:
      ASPNETCORE_ENVIRONMENT: ${APP_ENV:-Homolog}
      ConnectionStrings__AppConnection: ${DB_CONNECTION}
      Database__Schema: ${DB_SCHEMA:-homolog}
      Auth__JwtSecret: ${JWT_SECRET}
      Auth__JwtIssuer: ${JWT_ISSUER:-forzion.tech}
      Auth__JwtAudience: ${JWT_AUDIENCE:-forzion.tech}
      Mfa__EncryptionKey: ${MFA_ENCRYPTION_KEY}
      DataProtection__EncryptionKey: ${DATA_PROTECTION_KEY}
      Cors__AllowedOrigins: ${CORS_ORIGINS}
      DeliveryLog__RecipientHashKey: ${DELIVERY_LOG_HASH_KEY}
      Stripe__SecretKey: ${STRIPE_SECRET_KEY:-}
      Stripe__WebhookSecret: ${STRIPE_WEBHOOK_SECRET:-}
      Stripe__UrlBase: ${STRIPE_URL_BASE:-https://forzion.tech}
      Resend__ApiKey: ${RESEND_API_KEY:-}
      Resend__WebhookSecret: ${RESEND_WEBHOOK_SECRET:-}
      Email__RedirecionarDestinatariosPara: ${EMAIL_REDIRECT_TO:-}
      Email__AllowlistDominios: ${EMAIL_ALLOWLIST_DOMAINS:-}
      App__FrontendBaseUrl: ${APP_FRONTEND_BASE_URL:-https://forzion.tech}
      Internal__ApiKey: ${INTERNAL_API_KEY:-}
      Seed__ZapTestEmail: ${SEED_ZAP_TEST_EMAIL:-zap-test@forzion.tech}
      Seed__ZapTestPassword: ${SEED_ZAP_TEST_PASSWORD:-}
      WhatsApp__PhoneNumberId: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WhatsApp__AccessToken: ${WHATSAPP_ACCESS_TOKEN:-}
      WhatsApp__ApiVersion: ${WHATSAPP_API_VERSION:-v21.0}
      WhatsApp__AppSecret: ${WHATSAPP_APP_SECRET:-}
      WhatsApp__WebhookVerifyToken: ${WHATSAPP_WEBHOOK_VERIFY_TOKEN:-}
      WhatsApp__MarcarComoTeste: ${WHATSAPP_MARK_AS_TEST:-false}
      WhatsApp__RedirecionarDestinatariosPara: ${WHATSAPP_REDIRECT_TO:-}
      WhatsApp__AllowlistTelefones: ${WHATSAPP_ALLOWLIST_PHONES:-}
    mem_limit: 2560m
    cpu_shares: 1024
    pids_limit: 512
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      default: {}
      forzion-edge:
        aliases:
          - prd-backend

  frontend:
    image: ${REGISTRY}/forzion/frontend:${TAG:-latest}
    environment:
      NODE_ENV: production
      API_BASE_URL: http://backend:8080
      NEXT_PUBLIC_API_BASE_URL: /api/backend
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      # Mesmo segredo do backend (Auth__JwtSecret): /api/auth/me valida a assinatura do JWT.
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER:-forzion.tech}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-forzion.tech}
    mem_limit: 1280m
    cpu_shares: 1024
    pids_limit: 512
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      default: {}
      forzion-edge:
        aliases:
          - prd-frontend

networks:
  default: {}
  forzion-edge:
    external: true
