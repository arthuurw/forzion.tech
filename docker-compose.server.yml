services:
  backend:
    image: ${REGISTRY}/forzion/backend:${TAG:-latest}
    environment:
      ASPNETCORE_ENVIRONMENT: ${APP_ENV:-Homolog}
      ConnectionStrings__AppConnection: ${DB_CONNECTION}
      Database__Schema: ${DB_SCHEMA:-homolog}
      Auth__JwtSecret: ${JWT_SECRET}
      Auth__JwtIssuer: ${JWT_ISSUER:-forzion.tech}
      Auth__JwtAudience: ${JWT_AUDIENCE:-forzion.tech}
      Mfa__EncryptionKey: ${MFA_ENCRYPTION_KEY}
      Cors__AllowedOrigins: ${CORS_ORIGINS}
      DeliveryLog__RecipientHashKey: ${DELIVERY_LOG_HASH_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: ${REGISTRY}/forzion/frontend:${TAG:-latest}
    environment:
      NODE_ENV: production
      API_BASE_URL: http://backend:8080
      NEXT_PUBLIC_API_BASE_URL: /api/backend
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      # Mesmo segredo do backend (Auth__JwtSecret): /api/auth/me valida a assinatura do JWT.
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER:-forzion.tech}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-forzion.tech}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    restart: unless-stopped
    depends_on:
      - frontend

  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do
        certbot renew --webroot --webroot-path=/var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"
    restart: unless-stopped
