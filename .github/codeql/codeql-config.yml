# CodeQL config — SAST custom para frontend (TS/JS) + backend (C#).
# Workflow roda via GH Action (Fase 17): .github/workflows/codeql.yml

name: "forzion.tech CodeQL"

queries:
  - uses: security-extended
  - uses: security-and-quality

paths:
  - frontend/src
  - forzion.tech.Api
  - forzion.tech.Domain
  - forzion.tech.Infrastructure
  - forzion.tech.Application

paths-ignore:
  - frontend/node_modules
  - frontend/.next
  - frontend/coverage
  - frontend/storybook-static
  - frontend/playwright-report
  - frontend/test-results
  - frontend/src/test/msw/types.ts
  - "**/*.test.ts"
  - "**/*.test.tsx"
  - "**/*.spec.ts"
  - "**/__tests__/**"
  - "**/*.stories.tsx"
