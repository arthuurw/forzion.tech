name: Billing Renewal

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  renovar:
    name: Processar renovações mensais
    runs-on: ubuntu-latest
    steps:
      - name: Processar renovações
        run: |
          curl -f -X POST \
            -H "X-Internal-Key: ${{ secrets.INTERNAL_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://${{ secrets.HOMOLOG_HOST }}/internal/processar-renovacoes"
