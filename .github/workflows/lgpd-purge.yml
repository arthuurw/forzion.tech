name: LGPD Purge

on:
  schedule:
    - cron: '0 3 1 * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  purgar:
    name: Purga LGPD (5 anos pós-cancelamento)
    runs-on: ubuntu-latest
    steps:
      - name: Listar elegíveis e anonimizar
        run: |
          set -euo pipefail
          BASE="https://${{ secrets.HOMOLOG_HOST }}"
          KEY="${{ secrets.INTERNAL_API_KEY }}"

          ELEGIVEIS=$(curl -fsS \
            -H "X-Internal-Key: ${KEY}" \
            "${BASE}/internal/lgpd/contas-elegiveis" \
            | python3 -c 'import sys,json; print("\n".join(json.load(sys.stdin)["contas"]))')

          if [ -z "${ELEGIVEIS}" ]; then
            echo "Nenhuma conta elegível à purga."
            exit 0
          fi

          FALHAS=0
          PRIMEIRA=1
          # itera por substituição de processo (não pipe) p/ FALHAS persistir após o loop.
          while read -r ID; do
            [ -z "${ID}" ] && continue
            # rate-limit interno = 5 req/min → 1 DELETE a cada 15s. Sem sleep antes do 1º.
            if [ "${PRIMEIRA}" -eq 1 ]; then PRIMEIRA=0; else sleep 15; fi
            echo "Anonimizando conta ${ID}"
            STATUS=$(curl -sS -o /dev/null -w "%{http_code}" -X DELETE \
              -H "X-Internal-Key: ${KEY}" \
              "${BASE}/internal/lgpd/contas/${ID}")
            if [ "${STATUS}" -ge 200 ] && [ "${STATUS}" -lt 300 ]; then
              echo "  ok (${STATUS})"
            else
              echo "  FALHA (${STATUS}) na conta ${ID}"
              FALHAS=$((FALHAS + 1))
            fi
          done <<< "${ELEGIVEIS}"

          if [ "${FALHAS}" -ne 0 ]; then
            echo "Purga concluída com ${FALHAS} falha(s)."
            exit 1
          fi

      - name: Notificar falha via issue
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `[lgpd-purge] Falha em ${new Date().toISOString().slice(0, 10)}`;
            const body = [
              '⚠️ Workflow **LGPD Purge** falhou.',
              '',
              `**Run:** ${runUrl}`,
              `**Trigger:** ${context.eventName} (${context.ref})`,
              '',
              'Purga não concluída = contas elegíveis (5 anos pós-cancelamento) podem não ter sido anonimizadas.',
              '',
              'Investigar:',
              '1. Endpoints `/internal/lgpd/contas-elegiveis` e `/internal/lgpd/contas/{id}` responderam?',
              '2. `INTERNAL_API_KEY` da VM bate com secret do environment?',
              '3. Backend logs (`docker compose logs backend --tail 200`)',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ops', 'lgpd-purge-failed']
            });
