name: LGPD Purge

on:
  schedule:
    - cron: '0 3 1 * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  purgar:
    name: Purga LGPD (5 anos pós-cancelamento)
    runs-on: ubuntu-latest
    steps:
      - name: Listar elegíveis e anonimizar
        run: |
          set -euo pipefail
          BASE="https://${{ secrets.HOMOLOG_HOST }}"
          KEY="${{ secrets.INTERNAL_API_KEY }}"

          ELEGIVEIS=$(curl -fsS \
            -H "X-Internal-Key: ${KEY}" \
            "${BASE}/internal/lgpd/contas-elegiveis" \
            | python3 -c 'import sys,json; print("\n".join(json.load(sys.stdin)["contas"]))')

          if [ -z "${ELEGIVEIS}" ]; then
            echo "Nenhuma conta elegível à purga."
            exit 0
          fi

          echo "${ELEGIVEIS}" | while read -r ID; do
            [ -z "${ID}" ] && continue
            echo "Anonimizando conta ${ID}"
            curl -fsS -X DELETE \
              -H "X-Internal-Key: ${KEY}" \
              "${BASE}/internal/lgpd/contas/${ID}"
            sleep 1
          done

      - name: Notificar falha via issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `[lgpd-purge] Falha em ${new Date().toISOString().slice(0, 10)}`;
            const body = [
              '⚠️ Workflow **LGPD Purge** falhou.',
              '',
              `**Run:** ${runUrl}`,
              `**Trigger:** ${context.eventName} (${context.ref})`,
              '',
              'Purga não concluída = contas elegíveis (5 anos pós-cancelamento) podem não ter sido anonimizadas.',
              '',
              'Investigar:',
              '1. Endpoints `/internal/lgpd/contas-elegiveis` e `/internal/lgpd/contas/{id}` responderam?',
              '2. `INTERNAL_API_KEY` da VM bate com secret do environment?',
              '3. Backend logs (`docker compose logs backend --tail 200`)',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ops', 'lgpd-purge-failed']
            });
