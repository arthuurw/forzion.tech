name: LGPD Purge

on:
  schedule:
    - cron: '0 3 1 * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  purgar:
    name: Purga LGPD (5 anos pós-cancelamento)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: ${{ fromJSON(vars.CRON_ENVIRONMENTS || '["homolog"]') }}
    environment: ${{ matrix.env }}
    steps:
      - name: Conecta no tailnet
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4.1.2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          version: latest

      - name: Listar elegíveis e anonimizar
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        with:
          host: ${{ secrets.VM_TAILNET_IP }}
          username: ubuntu
          key: ${{ secrets.HOMOLOG_SSH_KEY }}
          script: |
            set -eu
            cd /opt/forzion/app
            EF=/opt/forzion/.env
            DC="docker compose -f ${{ vars.COMPOSE_FILE || 'docker-compose.homolog.yml' }} --env-file $EF"
            KEY="$(grep -E '^INTERNAL_API_KEY=' "$EF" | head -1 | cut -d= -f2-)"
            B="http://localhost:8080"

            ELEGIVEIS=$($DC exec -T backend curl -fsS \
              -H "X-Internal-Key: ${KEY}" \
              "${B}/internal/lgpd/contas-elegiveis" \
              | python3 -c 'import sys,json; print("\n".join(json.load(sys.stdin)["contas"]))')

            if [ -z "${ELEGIVEIS}" ]; then
              echo "Nenhuma conta elegível à purga."
              exit 0
            fi

            FALHAS=0
            PRIMEIRA=1
            for ID in ${ELEGIVEIS}; do
              if [ "${PRIMEIRA}" -eq 1 ]; then PRIMEIRA=0; else sleep 15; fi
              echo "Anonimizando conta ${ID}"
              STATUS=$($DC exec -T backend curl -sS -o /dev/null -w "%{http_code}" -X DELETE \
                -H "X-Internal-Key: ${KEY}" \
                "${B}/internal/lgpd/contas/${ID}")
              if [ "${STATUS}" -ge 200 ] && [ "${STATUS}" -lt 300 ]; then
                echo "  ok (${STATUS})"
              else
                echo "  FALHA (${STATUS}) na conta ${ID}"
                FALHAS=$((FALHAS + 1))
              fi
            done

            if [ "${FALHAS}" -ne 0 ]; then
              echo "Purga concluída com ${FALHAS} falha(s)."
              exit 1
            fi

      - name: Notificar falha via issue
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `[lgpd-purge] Falha em ${new Date().toISOString().slice(0, 10)}`;
            const body = [
              '⚠️ Workflow **LGPD Purge** falhou.',
              '',
              `**Run:** ${runUrl}`,
              `**Trigger:** ${context.eventName} (${context.ref})`,
              '',
              'Purga não concluída = contas elegíveis (5 anos pós-cancelamento) podem não ter sido anonimizadas.',
              '',
              'Investigar (ordem dos layers):',
              '1. Tailnet: runner conectou? ACL `tag:ci -> VM:22` (SSH) liberada?',
              '2. SSH: `VM_TAILNET_IP` bate com a VM? `HOMOLOG_SSH_KEY` válida?',
              '3. `docker compose exec backend` rodou? `/internal/lgpd/contas-elegiveis` e `/internal/lgpd/contas/{id}` responderam (401=key, 5xx=backend)?',
              '4. Backend logs (`docker compose logs backend --tail 200`)',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ops', 'lgpd-purge-failed']
            });
