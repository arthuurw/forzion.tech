name: R2 Lifecycle

# One-shot (workflow_dispatch): aplica retenção no bucket R2 dos backups DR.
# R2 é o ÚNICO backup (Supabase Free = sem backup gerenciado) → sem poda o bucket
# cresce ilimitado. Regra: expira dump > 90 dias (janela de recuperação/detecção de
# corrupção generosa; ~0.3MB/dia → 90 dumps ≈ 27MB). Idempotente (put substitui a
# config inteira). Filtro por prefixo forzion-db- não toca objeto não-backup.
# Retenção canônica: specs/specification-dr.md §1.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lifecycle:
    name: put-bucket-lifecycle -> R2
    runs-on: ubuntu-latest
    steps:
      - name: Aplicar + verificar lifecycle
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
          AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          set -euo pipefail
          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

          cat > lifecycle.json <<'JSON'
          {
            "Rules": [
              {
                "ID": "expire-backups-90d",
                "Status": "Enabled",
                "Filter": { "Prefix": "forzion-db-" },
                "Expiration": { "Days": 90 }
              },
              {
                "ID": "abort-incomplete-multipart-7d",
                "Status": "Enabled",
                "Filter": { "Prefix": "" },
                "AbortIncompleteMultipartUpload": { "DaysAfterInitiation": 7 }
              }
            ]
          }
          JSON

          aws s3api put-bucket-lifecycle-configuration \
            --bucket "${R2_BUCKET}" \
            --lifecycle-configuration file://lifecycle.json \
            --endpoint-url "${ENDPOINT}"

          echo "--- config aplicada:"
          aws s3api get-bucket-lifecycle-configuration \
            --bucket "${R2_BUCKET}" \
            --endpoint-url "${ENDPOINT}"
