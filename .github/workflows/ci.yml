name: CI / CD — Homolog

on:
  push:
    branches: [homolog]
    # PRs/pushes SÓ de documentação não rodam CI/CD (sem alteração de código).
    # Se TODOS os arquivos casarem paths-ignore, o workflow não dispara.
    paths-ignore: ["**.md", "docs/**", "specs/**"]
  pull_request:
    branches: [homolog]
    paths-ignore: ["**.md", "docs/**", "specs/**"]

# Cancela runs antigos do mesmo ref quando um novo push chega.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ─── DETECÇÃO DE ÁREAS ALTERADAS (path-filter) ───────────────────────────────
  # Decide quais jobs rodam: mudança só-frontend pula jobs backend e vice-versa.
  # Mudança em workflows OU no script de cobertura roda TUDO (safety).
  changes:
    name: Áreas alteradas
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'forzion.tech.Domain/**'
              - 'forzion.tech.Application/**'
              - 'forzion.tech.Infrastructure/**'
              - 'forzion.tech.Api/**'
              - 'forzion.tech.Tests/**'
              - '*.slnx'
              - 'Directory.*.props'
              - 'nuget.config'
            frontend:
              - 'frontend/**'
            ci:
              - '.github/workflows/**'
              - 'scripts/check-coverage.sh'

  # ─── HIGIENE ───────────────────────────────────────────────────────────────
  commitlint:
    name: Commitlint (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint commits do PR
        env:
          BASE_REF: ${{ github.base_ref }}
        run: npx commitlint --from "origin/$BASE_REF" --to HEAD --verbose

  # ─── TESTES BACKEND — unit (rápido, sem Docker, todo PR) ─────────────────────
  # F2: roda só os testes sem dependência de Docker (--filter Category!=Integration).
  # Os gates aqui (Domain/Application branch 75 + line/method 85; Api line 85 +
  # method 70) são 100% sustentados por testes unit — medido localmente, não caem
  # ao excluir os de integração. Os 5 RepositoryTests (Testcontainers) ficam fora.
  test-backend-unit:
    name: Backend — testes unit
    needs: [changes]
    if: ${{ needs.changes.outputs.backend == 'true' || needs.changes.outputs.ci == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Format — verifica estilo (.editorconfig)
        run: dotnet format forzion.tech.slnx --verify-no-changes --no-restore

      # ─── Cobertura consolidada: roda os testes UMA vez e avalia TODOS os
      # thresholds de um único relatório (ReportGenerator JsonSummary) via
      # scripts/check-coverage.sh. Antes, cada gate re-rodava `dotnet test` (6x).
      # Gates PRESERVADOS: Domain branch75/line85/method85; Application idem;
      # Api line85/method70 (exclui Migrations/Program). Baseline medido (unit-only):
      # Domain l95.0/b93.5/m94.1 · Application l94.8/b84.4/m97.1 · Api l87.9/m79.0.
      - name: Test + cobertura (1x)
        run: >
          dotnet test forzion.tech.Tests --no-build -c Release
          --filter "Category!=Integration"
          --logger "console;verbosity=minimal"
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=cobertura
          /p:CoverletOutput=./coverage/
          "/p:Exclude=[*]*.Migrations.*%2c[*]Program%2c[forzion.tech.Tests]*"

      - name: ReportGenerator (JsonSummary)
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool --version 5.3.11 || true
          export PATH="$PATH:$HOME/.dotnet/tools"
          reportgenerator -reports:forzion.tech.Tests/coverage/coverage.cobertura.xml -targetdir:coverage-report -reporttypes:JsonSummary

      - name: Gates de cobertura (Domain / Application / Api)
        run: >
          bash scripts/check-coverage.sh coverage-report/Summary.json
          "forzion.tech.Domain:branch=75,line=85,method=85"
          "forzion.tech.Application:branch=75,line=85,method=85"
          "forzion.tech.Api:line=85,method=70"

  # ─── TESTES BACKEND — integração (Docker / Testcontainers) ───────────────────
  # F2: roda a suíte COMPLETA (sem filtro). Os RepositoryTests sobem um Postgres
  # via Testcontainers — ubuntu-latest já traz Docker, sem precisar de `services:`.
  # A suíte inteira roda aqui porque os gates global (50 branch) e Infra (35 branch)
  # só fecham com a cobertura da UNIÃO unit + integração; medir só Category=Integration
  # derrubaria ambos. O gate Infra 35 também guarda contra os testes de integração
  # pararem de rodar em silêncio (cairia abaixo de 35 e falharia — sinal desejado).
  test-backend-integration:
    name: Backend — testes integração
    needs: [changes]
    if: ${{ needs.changes.outputs.backend == 'true' || needs.changes.outputs.ci == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      # ─── Cobertura consolidada: roda a suíte COMPLETA UMA vez; gates avaliados
      # de um único relatório (ReportGenerator JsonSummary) via check-coverage.sh.
      # Antes rodava `dotnet test` 2x (global + Infra). Gates PRESERVADOS:
      # global branch50; Infrastructure branch35 (exclui Migrations). O gate Infra
      # também guarda contra os testes de integração pararem de rodar em silêncio.
      - name: Test + cobertura (1x, suíte completa)
        run: >
          dotnet test forzion.tech.Tests --no-build -c Release
          --logger "console;verbosity=minimal"
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=cobertura
          /p:CoverletOutput=./coverage/
          "/p:Exclude=[forzion.tech.Tests]*%2C[*]*.Migrations.*%2C[*]Program"

      - name: ReportGenerator (JsonSummary)
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool --version 5.3.11 || true
          export PATH="$PATH:$HOME/.dotnet/tools"
          reportgenerator -reports:forzion.tech.Tests/coverage/coverage.cobertura.xml -targetdir:coverage-report -reporttypes:JsonSummary

      - name: Gates de cobertura (global + Infrastructure)
        run: >
          bash scripts/check-coverage.sh coverage-report/Summary.json
          "__overall__:branch=50"
          "forzion.tech.Infrastructure:branch=35"

      - name: Coverage summary (backend)
        if: always()
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: forzion.tech.Tests/coverage/coverage.cobertura.xml
          format: markdown
          output: both
          badge: true

      - name: Publica summary no run
        if: always()
        run: cat code-coverage-results.md >> "$GITHUB_STEP_SUMMARY"
        working-directory: ${{ github.workspace }}

      # F9.2 — relatório HTML de cobertura (ReportGenerator). Non-blocking: nunca
      # derruba o gate, serve só de artifact navegável. Tool global pinada.
      - name: Instala ReportGenerator (tool pinada)
        if: always()
        continue-on-error: true
        run: dotnet tool install --global dotnet-reportgenerator-globaltool --version 5.3.11

      - name: Gera relatório HTML de cobertura
        if: always()
        continue-on-error: true
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          reportgenerator \
            -reports:forzion.tech.Tests/coverage/coverage.cobertura.xml \
            -targetdir:coverage-report \
            -reporttypes:Html

      - name: Upload relatório HTML de cobertura
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-backend
          path: coverage-report/
          if-no-files-found: warn

  test-frontend:
    name: Frontend — lint + type check + testes
    needs: [changes]
    if: ${{ needs.changes.outputs.frontend == 'true' || needs.changes.outputs.ci == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test + coverage
        run: npm run test:coverage

      - name: Coverage report (frontend, PR comment)
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          working-directory: frontend

  build-frontend:
    name: Frontend — build + storybook
    needs: [changes]
    if: ${{ needs.changes.outputs.frontend == 'true' || needs.changes.outputs.ci == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build (next)
        run: npm run build
        env:
          # Guards de produção no next.config exigem API_BASE_URL e JWT_SECRET;
          # valores dummy servem só para o build estático passar (sem chamadas reais).
          API_BASE_URL: http://backend.invalid
          JWT_SECRET: ci-dummy-secret-not-used-at-build-time

      - name: Build Storybook
        run: npm run storybook:build

  # ─── SEGURANÇA / SUPPLY CHAIN (BACKEND .NET) ──────────────────────────────────
  security-backend:
    name: Security backend — vuln NuGet + SBOM
    needs: [changes]
    if: ${{ needs.changes.outputs.backend == 'true' || needs.changes.outputs.ci == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      # Gate de vulnerabilidade: lista pacotes (diretos + transitivos) com CVE
      # conhecido. `dotnet list package --vulnerable` sempre sai com código 0,
      # então detectamos a presença do header de vulnerabilidade na saída e
      # falhamos o job manualmente (gate bloqueante).
      - name: Vuln NuGet (gate — direto + transitivo)
        run: |
          set -euo pipefail
          dotnet list forzion.tech.slnx package --vulnerable --include-transitive \
            | tee vuln-report.txt
          if grep -q "has the following vulnerable packages" vuln-report.txt; then
            echo "::error::Pacotes NuGet vulneráveis encontrados (ver log acima)."
            exit 1
          fi
          echo "Nenhum pacote NuGet vulnerável encontrado."

      # SBOM .NET (CycloneDX) — tool global pinada. Gera o BOM da solução em
      # JSON e publica como artifact.
      - name: Instala CycloneDX (tool pinada)
        run: dotnet tool install --global CycloneDX --version 6.2.0

      - name: SBOM (CycloneDX .NET)
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          dotnet CycloneDX forzion.tech.slnx -o ./sbom-backend -F Json -fn sbom.cdx.json

      - name: Upload SBOM (backend)
        uses: actions/upload-artifact@v4
        with:
          name: sbom-backend
          path: sbom-backend/sbom.cdx.json
          if-no-files-found: error

  # ─── SEGURANÇA / SUPPLY CHAIN (FRONTEND) ──────────────────────────────────────
  # Roda em QUALQUER mudança de código (não só frontend): o step Gitleaks varre a
  # árvore inteira por segredos — pular em PR backend-only abriria buraco de
  # detecção. Os steps npm (audit/license/sbom) são frontend, mas o custo extra
  # num PR backend-only é aceitável frente à cobertura de segredos.
  security:
    name: Security — gitleaks + osv + audit + license + sbom
    needs: [changes]
    if: ${{ needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true' || needs.changes.outputs.ci == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      # Gitleaks roda ANTES do npm ci: varre só a árvore versionada (sem
      # node_modules instalado nem sbom gerado).
      - name: Gitleaks (working tree)
        working-directory: ${{ github.workspace }}
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest \
            detect --source=/repo --no-git \
            --config=/repo/.gitleaks.toml --redact --no-banner

      - name: OSV scanner (report-only)
        # Informativo: lockfile inclui deps dev. O gate bloqueante de vuln é o
        # `npm audit --omit=dev`. Triagem de vulns dev em fase futura.
        continue-on-error: true
        working-directory: ${{ github.workspace }}
        run: |
          docker run --rm -v "$PWD:/src" ghcr.io/google/osv-scanner:latest \
            --config=/src/osv-scanner.toml \
            --lockfile=/src/frontend/package-lock.json

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: npm audit (prod, >= high)
        run: npm run audit

      - name: License check
        run: npm run license

      - name: SBOM (CycloneDX)
        run: npm run sbom

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: frontend/sbom.cdx.json
          if-no-files-found: error

  # ─── GATE (required check) ─────────────────────────────────────────────────────
  # `if: always()` para rodar mesmo com jobs PULADOS pelo path-filter. Um job
  # pulado (result 'skipped') NÃO reprova; só 'failure'/'cancelled' reprovam o gate.
  gate:
    name: Gate
    needs: [changes, test-backend-unit, test-backend-integration, test-frontend, build-frontend, security, security-backend]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Agrega resultados dos jobs necessários
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          echo "Resultados dos jobs: $results"
          for r in $results; do
            case "$r" in
              failure|cancelled)
                echo "::error::Um job necessário terminou como '$r'."
                exit 1;;
            esac
          done
          echo "Todos os checks necessários passaram (sucesso ou pulados por path-filter)."

  # ─── DEPLOY HOMOLOG ──────────────────────────────────────────────────────────
  deploy-homolog:
    name: Deploy -> homolog
    needs: [gate]
    runs-on: ubuntu-latest
    environment: homolog
    if: github.event_name == 'push'
    steps:
      - name: Deploy na VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOMOLOG_HOST }}
          username: ubuntu
          key: ${{ secrets.HOMOLOG_SSH_KEY }}
          script: |
            set -e
            cd /opt/forzion/app
            git pull origin homolog

            docker compose -f docker-compose.homolog.yml --env-file /opt/forzion/.env build
            docker compose -f docker-compose.homolog.yml --env-file /opt/forzion/.env up -d --remove-orphans

            # Nginx config eh bind-mount (./nginx/nginx.conf). "up -d" nao
            # recria nginx quando so o arquivo muda, entao a config nova so
            # carrega com restart explicito.
            docker compose -f docker-compose.homolog.yml --env-file /opt/forzion/.env restart nginx

            docker image prune -f

            echo "Deploy homolog OK -- $(date)"
