name: CI / CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  BACKEND_IMAGE: ${{ secrets.OCI_REGISTRY }}/forzion/backend
  FRONTEND_IMAGE: ${{ secrets.OCI_REGISTRY }}/forzion/frontend

# ─── TESTES ──────────────────────────────────────────────────────────────────

jobs:
  test-backend:
    name: Backend — testes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test forzion.tech.Tests --no-build -c Release --logger "console;verbosity=minimal"

  test-frontend:
    name: Frontend — type check + testes
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

# ─── BUILD + PUSH (develop → homolog | main → prod) ─────────────────────────

  build-push:
    name: Build multi-arch + push OCIR
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main')
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "tag=$(echo $GITHUB_SHA | head -c7)" >> $GITHUB_OUTPUT

      - name: Set up QEMU (suporte ARM64)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login OCIR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.OCI_REGISTRY_HOST }}
          username: ${{ secrets.OCI_USERNAME }}
          password: ${{ secrets.OCI_AUTH_TOKEN }}

      - name: Build + push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: forzion.tech.Api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build + push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: frontend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# ─── DEPLOY HOMOLOG (develop) ─────────────────────────────────────────────────

  deploy-homolog:
    name: Deploy → homolog
    needs: build-push
    runs-on: ubuntu-latest
    environment: homolog
    if: github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4

      - name: Copiar arquivos para VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOMOLOG_HOST }}
          username: ubuntu
          key: ${{ secrets.HOMOLOG_SSH_KEY }}
          source: "docker-compose.server.yml,nginx/nginx.conf,nginx/nginx-init.conf,scripts/"
          target: /opt/forzion/

      - name: Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOMOLOG_HOST }}
          username: ubuntu
          key: ${{ secrets.HOMOLOG_SSH_KEY }}
          script: |
            set -e
            cd /opt/forzion

            # Login OCIR
            echo "${{ secrets.OCI_AUTH_TOKEN }}" | \
              docker login ${{ secrets.OCI_REGISTRY_HOST }} \
              -u "${{ secrets.OCI_USERNAME }}" --password-stdin

            # Atualizar TAG no .env
            sed -i "s/^TAG=.*/TAG=${{ needs.build-push.outputs.tag }}/" .env

            # Pull e restart
            docker compose -f docker-compose.server.yml --env-file .env pull
            docker compose -f docker-compose.server.yml --env-file .env up -d --remove-orphans

            # Limpar imagens antigas
            docker image prune -f

            echo "✅ Deploy concluído — tag: ${{ needs.build-push.outputs.tag }}"
