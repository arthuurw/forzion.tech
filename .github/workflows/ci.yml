name: CI / CD — Homolog

on:
  push:
    branches: [homolog]
    # PRs/pushes SÓ de documentação não rodam CI/CD (sem alteração de código).
    # Se TODOS os arquivos casarem paths-ignore, o workflow não dispara.
    paths-ignore: ["**.md", "docs/**", "specs/**"]
  pull_request:
    branches: [homolog]
    paths-ignore: ["**.md", "docs/**", "specs/**"]

# Cancela runs antigos do mesmo ref quando um novo push chega.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ─── DETECÇÃO DE ÁREAS ALTERADAS (path-filter) ───────────────────────────────
  # Decide quais jobs rodam: mudança só-frontend pula jobs backend e vice-versa.
  # Mudança em workflows OU no script de cobertura roda TUDO (safety).
  changes:
    name: Áreas alteradas
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'forzion.tech.Domain/**'
              - 'forzion.tech.Application/**'
              - 'forzion.tech.Infrastructure/**'
              - 'forzion.tech.Api/**'
              - 'forzion.tech.Tests/**'
              - '*.slnx'
              - 'Directory.*.props'
              - 'nuget.config'
            frontend:
              - 'frontend/**'
            ci:
              - '.github/workflows/**'
              - 'scripts/check-coverage.sh'
              - 'scripts/lint-migrations.sh'

  # ─── HIGIENE ───────────────────────────────────────────────────────────────
  commitlint:
    name: Commitlint (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint commits do PR
        env:
          BASE_REF: ${{ github.base_ref }}
        run: npx commitlint --from "origin/$BASE_REF" --to HEAD --verbose

  # Gates Domain/Application/Api são sustentados só por testes unit; os de
  # integração (Testcontainers) ficam fora deste job (--filter Category!=Integration).
  test-backend-unit:
    name: Backend — testes unit
    needs: [changes]
    # PR-only: push -> homolog confia no PR (commit de merge ~= head do PR, repo
    # solo). No push roda so a sanity de build (sanity-backend) + deploy.
    if: ${{ github.event_name == 'pull_request' && (needs.changes.outputs.backend == 'true' || needs.changes.outputs.ci == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Format — verifica estilo (.editorconfig)
        run: dotnet format forzion.tech.slnx --verify-no-changes --no-restore

      - name: Test + cobertura (1x)
        run: >
          dotnet test forzion.tech.Tests --no-build -c Release
          --filter "Category!=Integration"
          --logger "console;verbosity=minimal"
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=cobertura
          /p:CoverletOutput=./coverage/
          "/p:Exclude=[*]*.Migrations.*%2c[*]Program%2c[forzion.tech.Tests]*%2c[*]Microsoft.AspNetCore.OpenApi.Generated*"

      - name: ReportGenerator (JsonSummary)
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool --version 5.3.11 || true
          export PATH="$PATH:$HOME/.dotnet/tools"
          reportgenerator -reports:forzion.tech.Tests/coverage/coverage.cobertura.xml -targetdir:coverage-report -reporttypes:JsonSummary

      - name: Gates de cobertura (Domain / Application / Api)
        run: >
          bash scripts/check-coverage.sh coverage-report/Summary.json
          "forzion.tech.Domain:branch=75,line=85,method=85"
          "forzion.tech.Application:branch=75,line=85,method=85"
          "forzion.tech.Api:line=85,method=70"

  # Roda a suíte COMPLETA: os gates global (branch50) e Infra (branch35) só fecham
  # com a cobertura da UNIÃO unit+integração. Infra35 também falha se a integração
  # parar de rodar em silêncio.
  test-backend-integration:
    name: Backend — testes integração
    needs: [changes]
    # PR-only (ver test-backend-unit).
    if: ${{ github.event_name == 'pull_request' && (needs.changes.outputs.backend == 'true' || needs.changes.outputs.ci == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test + cobertura (1x, suíte completa)
        run: >
          dotnet test forzion.tech.Tests --no-build -c Release
          --logger "console;verbosity=minimal"
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=cobertura
          /p:CoverletOutput=./coverage/
          "/p:Exclude=[forzion.tech.Tests]*%2C[*]*.Migrations.*%2C[*]Program%2C[*]Microsoft.AspNetCore.OpenApi.Generated*"

      - name: ReportGenerator (JsonSummary)
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool --version 5.3.11 || true
          export PATH="$PATH:$HOME/.dotnet/tools"
          reportgenerator -reports:forzion.tech.Tests/coverage/coverage.cobertura.xml -targetdir:coverage-report -reporttypes:JsonSummary

      - name: Gates de cobertura (global + Infrastructure)
        run: >
          bash scripts/check-coverage.sh coverage-report/Summary.json
          "__overall__:branch=50"
          "forzion.tech.Infrastructure:branch=35"

      - name: Coverage summary (backend)
        if: always()
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: forzion.tech.Tests/coverage/coverage.cobertura.xml
          format: markdown
          output: both
          badge: true

      - name: Publica summary no run
        if: always()
        run: cat code-coverage-results.md >> "$GITHUB_STEP_SUMMARY"
        working-directory: ${{ github.workspace }}

      # F9.2 — relatório HTML de cobertura (ReportGenerator). Non-blocking: nunca
      # derruba o gate, serve só de artifact navegável. Tool global pinada.
      - name: Instala ReportGenerator (tool pinada)
        if: always()
        continue-on-error: true
        run: dotnet tool install --global dotnet-reportgenerator-globaltool --version 5.3.11

      - name: Gera relatório HTML de cobertura
        if: always()
        continue-on-error: true
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          reportgenerator \
            -reports:forzion.tech.Tests/coverage/coverage.cobertura.xml \
            -targetdir:coverage-report \
            -reporttypes:Html

      - name: Upload relatório HTML de cobertura
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report-backend
          path: coverage-report/
          if-no-files-found: warn

  test-frontend:
    name: Frontend — lint + type check + testes
    needs: [changes]
    # PR-only (ver test-backend-unit). No push, build-frontend faz a sanity.
    if: ${{ github.event_name == 'pull_request' && (needs.changes.outputs.frontend == 'true' || needs.changes.outputs.ci == 'true') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test + coverage
        run: npm run test:coverage

      - name: Coverage report (frontend, PR comment)
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          working-directory: frontend

  build-frontend:
    name: Frontend — build + storybook
    needs: [changes]
    if: ${{ needs.changes.outputs.frontend == 'true' || needs.changes.outputs.ci == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build (next)
        run: npm run build
        env:
          # Guards de produção no next.config exigem API_BASE_URL e JWT_SECRET;
          # valores dummy servem só para o build estático passar (sem chamadas reais).
          API_BASE_URL: http://backend.invalid
          JWT_SECRET: ci-dummy-secret-not-used-at-build-time

      - name: Build Storybook
        run: npm run storybook:build

  # ─── SEGURANÇA / SUPPLY CHAIN (BACKEND .NET) ──────────────────────────────────
  security-backend:
    name: Security backend — vuln NuGet + SBOM
    needs: [changes]
    # PR-only (ver test-backend-unit).
    if: ${{ github.event_name == 'pull_request' && (needs.changes.outputs.backend == 'true' || needs.changes.outputs.ci == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      # Gate de vulnerabilidade: lista pacotes (diretos + transitivos) com CVE
      # conhecido. `dotnet list package --vulnerable` sempre sai com código 0,
      # então detectamos a presença do header de vulnerabilidade na saída e
      # falhamos o job manualmente (gate bloqueante).
      - name: Vuln NuGet (gate — direto + transitivo)
        run: |
          set -euo pipefail
          dotnet list forzion.tech.slnx package --vulnerable --include-transitive \
            | tee vuln-report.txt
          if grep -q "has the following vulnerable packages" vuln-report.txt; then
            echo "::error::Pacotes NuGet vulneráveis encontrados (ver log acima)."
            exit 1
          fi
          echo "Nenhum pacote NuGet vulnerável encontrado."

      # SBOM .NET (CycloneDX) — tool global pinada. Gera o BOM da solução em
      # JSON e publica como artifact.
      - name: Instala CycloneDX (tool pinada)
        run: dotnet tool install --global CycloneDX --version 6.2.0

      - name: SBOM (CycloneDX .NET)
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          dotnet CycloneDX forzion.tech.slnx -o ./sbom-backend -F Json -fn sbom.cdx.json

      - name: Upload SBOM (backend)
        uses: actions/upload-artifact@v7
        with:
          name: sbom-backend
          path: sbom-backend/sbom.cdx.json
          if-no-files-found: error

  # ─── SEGURANÇA / SUPPLY CHAIN (FRONTEND) ──────────────────────────────────────
  # Roda em QUALQUER mudança de código (não só frontend): o step Gitleaks varre a
  # árvore inteira por segredos — pular em PR backend-only abriria buraco de
  # detecção. Os steps npm (audit/license/sbom) são frontend, mas o custo extra
  # num PR backend-only é aceitável frente à cobertura de segredos.
  security:
    name: Security — gitleaks + osv + audit + license + sbom
    needs: [changes]
    # PR-only (ver test-backend-unit). Gitleaks/audit ja varreram o head do PR.
    if: ${{ github.event_name == 'pull_request' && (needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true' || needs.changes.outputs.ci == 'true') }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      # Gitleaks roda ANTES do npm ci: varre só a árvore versionada (sem
      # node_modules instalado nem sbom gerado).
      - name: Gitleaks (working tree)
        working-directory: ${{ github.workspace }}
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f \
            detect --source=/repo --no-git \
            --config=/repo/.gitleaks.toml --redact --no-banner

      - name: OSV scanner (report-only)
        # Informativo: lockfile inclui deps dev. O gate bloqueante de vuln é o
        # `npm audit --omit=dev`. Triagem de vulns dev em fase futura.
        continue-on-error: true
        working-directory: ${{ github.workspace }}
        run: |
          docker run --rm -v "$PWD:/src" ghcr.io/google/osv-scanner@sha256:64e86bec6df2466feea5137fc7c78fb3b7c21ec077f014d7130f64810e50676b \
            --config=/src/osv-scanner.toml \
            --lockfile=/src/frontend/package-lock.json

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: npm audit (prod, >= high)
        run: npm run audit

      - name: License check
        run: npm run license

      - name: SBOM (CycloneDX)
        run: npm run sbom

      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: frontend/sbom.cdx.json
          if-no-files-found: error

  # ─── SANITY DE BUILD (push -> homolog) ───────────────────────────────────────
  # No push os testes pesados nao re-rodam (PR-only — o PR ja os validou). Esta
  # sanity garante que o backend COMPILA antes do deploy SSH (que faz
  # `docker compose build` na VM) — pega quebra de build cedo, sem o custo de
  # testes + cobertura. Frontend tem a sanity no build-frontend (roda em push).
  sanity-backend:
    name: Backend — sanity build (push)
    needs: [changes]
    if: ${{ github.event_name == 'push' && (needs.changes.outputs.backend == 'true' || needs.changes.outputs.ci == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore -c Release

  # ─── LINT DE MIGRATION ARRISCADA (R5 deploy-safety) ──────────────────────────
  # PR-only: varre as migrations ADICIONADAS no PR (diff vs base) e reprova padrões
  # data-dependentes que o CI em DB vazio (Testcontainers) não pega — índice UNIQUE,
  # AddColumn/AlterColumn NOT NULL sem default. Justificar via `lint-migrations:allow`
  # na migration (após dedup/backfill). fetch-depth:0 p/ o diff vs origin/<base>.
  lint-migrations:
    name: Lint migrations (PR)
    needs: [changes]
    if: ${{ github.event_name == 'pull_request' && (needs.changes.outputs.backend == 'true' || needs.changes.outputs.ci == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Lint migrations arriscadas
        env:
          BASE_REF: origin/${{ github.base_ref }}
        run: bash scripts/lint-migrations.sh

  # ─── ZAP BASELINE EFÊMERO (DAST passivo bloqueante — PR gate) ────────────────
  # Frontend-only: o baseline é passivo (headers/CSP da resposta), não precisa de
  # backend/DB. Detalhe/cobertura em specs/specification-security.md §6.
  zap-baseline:
    name: ZAP baseline (efêmero — PR gate)
    needs: [changes]
    if: ${{ github.event_name == 'pull_request' && (needs.changes.outputs.frontend == 'true' || needs.changes.outputs.ci == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build imagem frontend
        run: docker build -t forzion-frontend-zap ./frontend

      - name: Sobe frontend efêmero
        run: |
          docker run -d --name fe -p 3001:3000 \
            -e JWT_SECRET=ci-zap-dummy-jwt-secret-0000000000000000 \
            -e API_BASE_URL=http://127.0.0.1:9 \
            forzion-frontend-zap
          up=0
          for _ in $(seq 1 60); do
            if curl -fsS -o /dev/null http://localhost:3001; then up=1; break; fi
            sleep 5
          done
          if [ "$up" != 1 ]; then echo "::error::Frontend efêmero não respondeu."; docker logs fe || true; exit 1; fi

      - name: ZAP baseline (reprova em alerta novo)
        run: |
          docker run --rm --network host \
            -v "$PWD/.zap:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t http://localhost:3001 -c baseline.conf

      - name: Logs do frontend (se falhou)
        if: failure()
        run: docker logs fe || true

      - name: Tear down
        if: always()
        run: docker rm -f fe || true

  # ─── GATE (required check) ─────────────────────────────────────────────────────
  # `if: always()` para rodar mesmo com jobs PULADOS pelo path-filter ou por
  # evento (testes pesados sao PR-only). Um job pulado (result 'skipped') NÃO
  # reprova; só 'failure'/'cancelled' reprovam o gate.
  gate:
    name: Gate
    needs: [changes, test-backend-unit, test-backend-integration, test-frontend, build-frontend, security, security-backend, sanity-backend, lint-migrations, zap-baseline]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Agrega resultados dos jobs necessários
        run: |
          results="${{ join(needs.*.result, ' ') }}"
          echo "Resultados dos jobs: $results"
          for r in $results; do
            case "$r" in
              failure|cancelled)
                echo "::error::Um job necessário terminou como '$r'."
                exit 1;;
            esac
          done
          echo "Todos os checks necessários passaram (sucesso ou pulados por path-filter)."

  # ─── DEPLOY HOMOLOG ──────────────────────────────────────────────────────────
  deploy-homolog:
    name: Deploy -> homolog
    needs: [gate]
    runs-on: ubuntu-latest
    environment: homolog
    # GOTCHA: o `success()` IMPLÍCITO (todo `if:` sem status-function injeta um)
    # avalia o grafo TRANSITIVO de needs. Com os testes pesados PR-only, em push
    # eles ficam `skipped` -> `gate` passa (always()) mas o success() implícito do
    # deploy vê ancestrais skipped e PULA o deploy mesmo com gate=success.
    # Fix: `always()` desliga o success() implícito; exigimos gate=success + push
    # explicitamente. Sem isto o merge em homolog NÃO deploya (regressão silenciosa).
    if: ${{ always() && needs.gate.result == 'success' && github.event_name == 'push' }}
    steps:
      # Borda Hostinger dropa o IP rotativo do runner na 22 pública (timeout). Runner
      # entra no tailnet (nó efêmero tag:ci) e fala com a VPS pelo IP privado 100.x.y.z
      # — NAT traversal + DERP, zero porta inbound exposta. VM_TAILNET_IP = IP tailnet.
      - name: Conecta no tailnet
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4.1.2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          version: latest

      - name: Deploy na VM
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        with:
          host: ${{ secrets.VM_TAILNET_IP }}
          username: ubuntu
          key: ${{ secrets.HOMOLOG_SSH_KEY }}
          script: |
            set -e
            cd /opt/forzion/app
            git pull origin homolog

            EF=/opt/forzion/.env
            DC="docker compose -f ${{ vars.COMPOSE_FILE || 'docker-compose.homolog.yml' }} --env-file $EF"

            # R4: guarda as imagens em uso ANTES do build, para rollback por tag se o health reprovar.
            PREV_BACKEND="$($DC images -q backend 2>/dev/null || true)"
            PREV_FRONTEND="$($DC images -q frontend 2>/dev/null || true)"

            $DC build

            # R3 (Gate A): dry-run do migrate contra uma cópia do schema homolog real. Falha aborta
            # o deploy (set -e) antes de tocar o real. DB_CONNECTION é lido cru do .env (a string
            # Npgsql tem ';' e espaços — sourcing quebraria); aspas externas, se houver, removidas.
            DB_CONNECTION="$(grep -E '^DB_CONNECTION=' "$EF" | head -1 | cut -d= -f2-)"
            DB_CONNECTION="${DB_CONNECTION%\"}"; DB_CONNECTION="${DB_CONNECTION#\"}"
            export DB_CONNECTION
            ENV_FILE="$EF" bash scripts/migrate-dryrun.sh

            # R2 (Gate B): migrate real como one-shot ANTES do up -d. Falha aborta (set -e) e os
            # containers ANTIGOS seguem servindo (zero downtime). Boot normal não migra (Homolog).
            $DC run --rm --no-deps backend migrate

            $DC up -d --remove-orphans

            # R4 (Gate C): health-gate pós-deploy. backend não publica porta no host → curl por dentro
            # do container. Reprovou (liveness ou readiness/DB) → rollback para a imagem anterior.
            health_ok=0
            for _ in $(seq 1 30); do
              if $DC exec -T backend curl -fsS http://localhost:8080/health >/dev/null 2>&1 \
                 && $DC exec -T backend curl -fsS http://localhost:8080/health/ready >/dev/null 2>&1; then
                health_ok=1; break
              fi
              sleep 4
            done

            if [ "$health_ok" != 1 ]; then
              # Sem imagem anterior (1º deploy, ou podada por prune entre deploys) não há pra onde
              # reverter: re-subir --no-build só recolocaria a imagem NOVA quebrada de pé fingindo
              # rollback. Aborta explícito exigindo intervenção manual em vez de mascarar.
              if [ -z "$PREV_BACKEND" ] || [ -z "$PREV_FRONTEND" ]; then
                echo "::error::Health gate REPROVADO e SEM imagem anterior para rollback (PREV vazio). Build quebrado de pé — intervenção manual necessária."
                exit 1
              fi
              echo "::error::Health gate REPROVADO pós-deploy — revertendo para a imagem anterior."
              IMG_BACKEND="$($DC config --images backend | head -1)"
              IMG_FRONTEND="$($DC config --images frontend | head -1)"
              docker tag "$PREV_BACKEND" "$IMG_BACKEND"
              docker tag "$PREV_FRONTEND" "$IMG_FRONTEND"
              $DC up -d --no-build --remove-orphans
              exit 1
            fi

            # Nginx config eh bind-mount (./nginx/nginx.conf). "up -d" nao
            # recria nginx quando so o arquivo muda, entao a config nova so
            # carrega com restart explicito.
            $DC restart nginx

            docker image prune -f
            docker builder prune -f --reserved-space 5g

            echo "Deploy homolog OK -- $(date)"

  # ─── PACT — PÓS-DEPLOY (broker via tailnet) ──────────────────────────────────
  # O broker Pact mora na MESMA VM do app. O runner do GitHub NÃO alcança o broker
  # pela borda pública (https://pact.<host>): a borda Hostinger dropa o IP rotativo
  # do runner — MESMO motivo que força o deploy a usar tailnet (ver "Conecta no
  # tailnet" do deploy-homolog). Mover Pact p/ pós-deploy/heartbeat NÃO resolve isso
  # (espera uma borda que segue dropando o runner) — foi a regressão recorrente.
  #
  # INVARIANTE (não regredir): TODO job que fala com o broker DEVE (1) entrar no
  # tailnet e (2) mapear o host do broker -> IP privado da VM (VM_TAILNET_IP) antes
  # de qualquer acesso. Assim o tráfego vai runner->tailnet->nginx:443->broker, com
  # TLS/SNI intactos (cert valida pelo hostname). Nenhuma mudança de timing/deploy
  # reintroduz o erro porque a rota não depende da borda pública.
  #
  # PRÉ-REQUISITO DE INFRA (não versionado no repo — vive no console Tailscale):
  # o policy precisa liberar `tag:ci` -> VM em tcp:443 (além do tcp:22 do SSH).
  # `tag:ci` é escopo restrito; sem esse grant a 443 via tailnet é DROPADA pela ACL
  # (connect-timeout idêntico ao público) — tailnet+resolve sozinhos NÃO bastam.
  # Detalhe canônico em specs/specification-local-ci-repro.md (§Pact broker rota).
  # Ordem consumer→provider é só de publicação (não é race). PR segue coberto pelo
  # gate file-source SEM broker em contract.yml.
  pact-publish:
    name: Pact — publica consumer (pós-deploy)
    needs: [deploy-homolog]
    # `always() && result==success`: o success() IMPLÍCITO avalia o grafo
    # TRANSITIVO de needs — com os jobs PR-only skipados em push, pularia este
    # também (mesmo gotcha do deploy-homolog acima).
    if: ${{ always() && needs.deploy-homolog.result == 'success' }}
    runs-on: ubuntu-latest
    environment: homolog
    env:
      PACT_BROKER_BASE_URL: ${{ secrets.PACT_BROKER_BASE_URL }}
      PACT_BROKER_USERNAME: ${{ secrets.PACT_BROKER_USERNAME }}
      PACT_BROKER_PASSWORD: ${{ secrets.PACT_BROKER_PASSWORD }}
      PACT_CONSUMER_VERSION: ${{ github.sha }}
      PACT_CONSUMER_BRANCH: ${{ github.ref_name }}
      VM_TAILNET_IP: ${{ secrets.VM_TAILNET_IP }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Gera + valida contrato consumer
        run: npm run test:contract

      # INVARIANTE (ver bloco do grupo PACT acima): broker alcançado SÓ via tailnet.
      - name: Conecta no tailnet
        if: ${{ env.PACT_BROKER_BASE_URL != '' }}
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4.1.2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          version: latest

      # Resolve o host do broker p/ o IP privado da VM (VM_TAILNET_IP), no runner e
      # nos containers pact-cli (--add-host abaixo). TLS/SNI seguem pelo hostname.
      - name: Resolve broker via tailnet
        if: ${{ env.PACT_BROKER_BASE_URL != '' }}
        run: |
          BROKER_HOST="$(printf '%s' "$PACT_BROKER_BASE_URL" | sed -E 's#^https?://##; s#/.*$##')"
          echo "BROKER_HOST=$BROKER_HOST" >> "$GITHUB_ENV"
          echo "$VM_TAILNET_IP $BROKER_HOST" | sudo tee -a /etc/hosts

      - name: Aguarda broker disponivel
        if: ${{ env.PACT_BROKER_BASE_URL != '' }}
        run: |
          for i in $(seq 1 12); do
            if curl -fsS --connect-timeout 10 --max-time 20 -u "$PACT_BROKER_USERNAME:$PACT_BROKER_PASSWORD" \
              "$PACT_BROKER_BASE_URL/diagnostic/status/heartbeat" >/dev/null; then
              echo "broker ok"; exit 0
            fi
            echo "broker indisponivel (restart?), retry $i/12..."; sleep 15
          done
          echo "broker nao respondeu apos 12 tentativas"; exit 1

      - name: Publica no broker
        if: ${{ env.PACT_BROKER_BASE_URL != '' }}
        run: |
          docker run --rm \
            --add-host "${BROKER_HOST}:${VM_TAILNET_IP}" \
            -v "$PWD/pacts:/pacts" \
            -e PACT_BROKER_BASE_URL -e PACT_BROKER_USERNAME -e PACT_BROKER_PASSWORD \
            pactfoundation/pact-cli@sha256:0ab9d13bb7e46da28c108df49f390bc173616906f41af79c4fa5a08d24277bdc \
            publish /pacts \
            --consumer-app-version="${PACT_CONSUMER_VERSION}" \
            --branch="${PACT_CONSUMER_BRANCH}"

      - name: can-i-deploy (consumer)
        if: ${{ env.PACT_BROKER_BASE_URL != '' }}
        # Report-only ate o provider verificar e registrar o deploy no environment
        # homolog (job pact-provider-verify a seguir). Sem verificacao, o broker
        # corretamente responde "no" — nao deve derrubar a workflow ainda.
        continue-on-error: true
        run: |
          docker run --rm \
            --add-host "${BROKER_HOST}:${VM_TAILNET_IP}" \
            -e PACT_BROKER_BASE_URL -e PACT_BROKER_USERNAME -e PACT_BROKER_PASSWORD \
            pactfoundation/pact-cli@sha256:0ab9d13bb7e46da28c108df49f390bc173616906f41af79c4fa5a08d24277bdc \
            broker can-i-deploy \
            --pacticipant=forzion-frontend \
            --version="${PACT_CONSUMER_VERSION}" \
            --to-environment=homolog

  pact-provider-verify:
    name: Pact — verifica provider (pós-deploy)
    needs: [pact-publish]
    if: ${{ always() && needs.pact-publish.result == 'success' }}
    runs-on: ubuntu-latest
    environment: homolog
    env:
      PACT_BROKER_BASE_URL: ${{ secrets.PACT_BROKER_BASE_URL }}
      PACT_BROKER_USERNAME: ${{ secrets.PACT_BROKER_USERNAME }}
      PACT_BROKER_PASSWORD: ${{ secrets.PACT_BROKER_PASSWORD }}
      VM_TAILNET_IP: ${{ secrets.VM_TAILNET_IP }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      # INVARIANTE (ver bloco do grupo PACT acima): broker alcançado SÓ via tailnet.
      - name: Conecta no tailnet
        if: ${{ env.PACT_BROKER_BASE_URL != '' }}
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4.1.2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          version: latest

      - name: Resolve broker via tailnet
        if: ${{ env.PACT_BROKER_BASE_URL != '' }}
        run: |
          BROKER_HOST="$(printf '%s' "$PACT_BROKER_BASE_URL" | sed -E 's#^https?://##; s#/.*$##')"
          echo "$VM_TAILNET_IP $BROKER_HOST" | sudo tee -a /etc/hosts

      - name: Aguarda broker disponivel
        if: ${{ env.PACT_BROKER_BASE_URL != '' }}
        run: |
          for i in $(seq 1 12); do
            if curl -fsS --connect-timeout 10 --max-time 20 -u "$PACT_BROKER_USERNAME:$PACT_BROKER_PASSWORD" \
              "$PACT_BROKER_BASE_URL/diagnostic/status/heartbeat" >/dev/null; then
              echo "broker ok"; exit 0
            fi
            echo "broker indisponivel (restart?), retry $i/12..."; sleep 15
          done
          echo "broker nao respondeu apos 12 tentativas"; exit 1

      - name: Verifica contratos (provider)
        run: dotnet test forzion.tech.PactVerification/forzion.tech.PactVerification.csproj -c Release --nologo
        env:
          CI: "true"
          GITHUB_SHA: ${{ github.sha }}
