name: CI / CD — Homolog

on:
  push:
    branches: [homolog]
  pull_request:
    branches: [homolog]

# ─── TESTES ──────────────────────────────────────────────────────────────────

jobs:
  test-backend:
    name: Backend — testes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test (global — 50% branch)
        run: >
          dotnet test forzion.tech.Tests --no-build -c Release
          --logger "console;verbosity=minimal"
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=cobertura
          /p:CoverletOutput=./coverage/
          /p:Threshold=50
          /p:ThresholdType=branch
          /p:ThresholdStat=Total
          "/p:Exclude=[forzion.tech.Tests]*%2C[*]*.Migrations.*%2C[*]Program"

      - name: Coverage — Domain (75% branch)
        run: >
          dotnet test forzion.tech.Tests --no-build -c Release
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=cobertura
          /p:Include=[forzion.tech.Domain]*
          /p:Threshold=75
          /p:ThresholdType=branch
          /p:ThresholdStat=Total

      - name: Coverage — Application (75% branch)
        run: >
          dotnet test forzion.tech.Tests --no-build -c Release
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=cobertura
          /p:Include=[forzion.tech.Application]*
          /p:Threshold=75
          /p:ThresholdType=branch
          /p:ThresholdStat=Total

  test-frontend:
    name: Frontend — type check + testes
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm run test:coverage

# ─── DEPLOY HOMOLOG ──────────────────────────────────────────────────────────

  deploy-homolog:
    name: Deploy -> homolog
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    environment: homolog
    if: github.event_name == 'push'
    steps:
      - name: Deploy na VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOMOLOG_HOST }}
          username: ubuntu
          key: ${{ secrets.HOMOLOG_SSH_KEY }}
          script: |
            set -e
            cd /opt/forzion/app
            git pull origin homolog

            docker compose -f docker-compose.homolog.yml --env-file /opt/forzion/.env build
            docker compose -f docker-compose.homolog.yml --env-file /opt/forzion/.env up -d --remove-orphans

            # Nginx config eh bind-mount (./nginx/nginx.conf). "up -d" nao
            # recria nginx quando so o arquivo muda, entao a config nova so
            # carrega com restart explicito.
            docker compose -f docker-compose.homolog.yml --env-file /opt/forzion/.env restart nginx

            docker image prune -f

            echo "Deploy homolog OK -- $(date)"
