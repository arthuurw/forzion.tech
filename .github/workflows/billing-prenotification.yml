name: Billing Pre-notification

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  pre-aviso:
    name: Pré-aviso de renovação (3 dias antes)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: ${{ fromJSON(vars.CRON_ENVIRONMENTS || '["homolog"]') }}
    environment: ${{ matrix.env }}
    steps:
      - name: Conecta no tailnet
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4.1.2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          version: latest

      - name: Pré-aviso alunos
        run: |
          curl -f -X POST \
            --resolve "${{ vars.APP_HOST }}:443:${{ secrets.VM_TAILNET_IP }}" \
            -H "X-Internal-Key: ${{ secrets.INTERNAL_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://${{ vars.APP_HOST }}/internal/processar-pre-avisos"

      - name: Pré-aviso treinadores
        run: |
          curl -f -X POST \
            --resolve "${{ vars.APP_HOST }}:443:${{ secrets.VM_TAILNET_IP }}" \
            -H "X-Internal-Key: ${{ secrets.INTERNAL_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://${{ vars.APP_HOST }}/internal/processar-pre-avisos-treinador"

      - name: Notificar falha via issue
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `[billing-prenotification] Falha em ${new Date().toISOString().slice(0, 10)}`;
            const body = [
              '⚠️ Workflow **Billing Pre-notification** falhou.',
              '',
              `**Run:** ${runUrl}`,
              `**Trigger:** ${context.eventName} (${context.ref})`,
              '',
              'Sem pré-aviso hoje = assinantes cuja `DataProximaCobranca` cai em 3 dias não foram avisados (CDC art. 52).',
              '',
              'Investigar (ordem dos layers):',
              '1. Tailnet: runner conectou? ACL `tag:ci -> VM:443` liberada?',
              '2. `VM_TAILNET_IP` / `APP_HOST` (env) batem com a VM atual?',
              '3. Endpoints `/internal/processar-pre-avisos[-treinador]` responderam (401=key, 5xx=backend)?',
              '4. Backend logs (`docker compose logs backend --tail 200`)',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ops', 'billing-prenotification-failed']
            });
