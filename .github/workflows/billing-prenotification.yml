name: Billing Pre-notification

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  pre-aviso:
    name: Pré-aviso de renovação (3 dias antes)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: ${{ fromJSON(vars.CRON_ENVIRONMENTS || '["homolog"]') }}
    environment: ${{ matrix.env }}
    steps:
      - name: Conecta no tailnet
        uses: tailscale/github-action@780049a30b6ff5c378a9e7b389d15ece7a204888 # v4.1.3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          version: latest

      - name: Pré-aviso alunos e treinadores
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        with:
          host: ${{ secrets.VM_TAILNET_IP }}
          username: ubuntu
          key: ${{ matrix.env == 'production' && secrets.PROD_SSH_KEY || secrets.HOMOLOG_SSH_KEY }}
          script: |
            set -eu
            cd ${{ vars.APP_DIR || '/opt/forzion/app' }}
            EF=${{ vars.ENV_FILE || '/opt/forzion/.env' }}
            PROJ="${{ vars.COMPOSE_PROJECT }}"
            DC="docker compose ${PROJ:+-p $PROJ} -f ${{ vars.COMPOSE_FILE || 'docker-compose.homolog.yml' }} --env-file $EF"
            KEY="$(grep -E '^INTERNAL_API_KEY=' "$EF" | head -1 | cut -d= -f2-)"
            for ROTA in processar-pre-avisos processar-pre-avisos-treinador; do
              $DC exec -T backend curl -fsS -X POST \
                -H "X-Internal-Key: $KEY" -H "Content-Type: application/json" \
                "http://localhost:8080/internal/$ROTA"
            done

      - name: Healthchecks ping (success)
        if: success()
        run: curl -fsS -m 10 --retry 3 "https://hc-ping.com/${{ secrets.HC_PING_KEY }}/billing-prenotification" || true
      - name: Healthchecks ping (failure)
        if: failure()
        run: curl -fsS -m 10 --retry 3 "https://hc-ping.com/${{ secrets.HC_PING_KEY }}/billing-prenotification/fail" || true

      - name: Notificar falha via issue
        if: failure()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `[billing-prenotification] Falha em ${new Date().toISOString().slice(0, 10)}`;
            const body = [
              '⚠️ Workflow **Billing Pre-notification** falhou.',
              '',
              `**Run:** ${runUrl}`,
              `**Trigger:** ${context.eventName} (${context.ref})`,
              '',
              'Sem pré-aviso hoje = assinantes cuja `DataProximaCobranca` cai em 3 dias não foram avisados (CDC art. 52).',
              '',
              'Investigar (ordem dos layers):',
              '1. Tailnet: runner conectou? ACL `tag:ci -> VM:22` (SSH) liberada?',
              '2. SSH: `VM_TAILNET_IP` bate com a VM? Chave SSH do ambiente `${{ matrix.env }}` válida?',
              '3. `docker compose exec backend` rodou? `/internal/processar-pre-avisos[-treinador]` responderam (401=key, 5xx=backend)?',
              '4. Backend logs (`docker compose logs backend --tail 200`)',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ops', 'billing-prenotification-failed']
            });
