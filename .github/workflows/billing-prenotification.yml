name: Billing Pre-notification

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  pre-aviso:
    name: Pré-aviso de renovação (3 dias antes)
    runs-on: ubuntu-latest
    steps:
      - name: Pré-aviso alunos
        run: |
          curl -f -X POST \
            -H "X-Internal-Key: ${{ secrets.INTERNAL_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://${{ secrets.HOMOLOG_HOST }}/internal/processar-pre-avisos"

      - name: Pré-aviso treinadores
        run: |
          curl -f -X POST \
            -H "X-Internal-Key: ${{ secrets.INTERNAL_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://${{ secrets.HOMOLOG_HOST }}/internal/processar-pre-avisos-treinador"

      - name: Notificar falha via issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `[billing-prenotification] Falha em ${new Date().toISOString().slice(0, 10)}`;
            const body = [
              '⚠️ Workflow **Billing Pre-notification** falhou.',
              '',
              `**Run:** ${runUrl}`,
              `**Trigger:** ${context.eventName} (${context.ref})`,
              '',
              'Sem pré-aviso hoje = assinantes cuja `DataProximaCobranca` cai em 3 dias não foram avisados (CDC art. 52).',
              '',
              'Investigar:',
              '1. Endpoints `/internal/processar-pre-avisos` e `/internal/processar-pre-avisos-treinador` responderam?',
              '2. `INTERNAL_API_KEY` da VM bate com secret do environment?',
              '3. Backend logs (`docker compose logs backend --tail 200`)',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ops', 'billing-prenotification-failed']
            });
