name: SAST — Semgrep

# SAST gratuito, roda 100% no CI (sem GitHub Advanced Security, sem upload).
# Substitui o CodeQL (que exigia code scanning/GHAS em repo privado).
#
# So em pull_request: o commit de merge ~= head do PR (repo solo, sem skew),
# entao re-rodar em push -> homolog so queimaria minutos sem gatear o deploy
# (workflow separado do ci.yml). schedule removido: nao dispara fora da branch
# default e o repo nao a tem aqui.
on:
  pull_request:
    branches: [homolog]
    paths-ignore: ["**.md", "docs/**", "specs/**"]
  workflow_dispatch:

jobs:
  semgrep:
    name: Semgrep scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v6

      # --error: falha o job em qualquer finding bloqueante.
      # Escopo via .semgrepignore (nginx/infra + fixtures de teste fora).
      - name: Semgrep scan
        run: semgrep scan --config p/default --error --metrics=off
