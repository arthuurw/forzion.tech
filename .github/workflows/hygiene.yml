name: Hygiene — dead code

# Higiene de código: dependências circulares (madge, bloqueante) + código/deps
# não usados (knip, report-only — tem falsos positivos com a config de projects
# do Vitest 4, então informa sem derrubar o build).
# So em pull_request: roda no PR antes do merge. NAO em push -> homolog (merge
# ~= head do PR, repo solo) — re-rodar so queimaria minutos e nao gateia o
# deploy do ci.yml (workflow separado).
on:
  pull_request:
    branches: [homolog]
    paths:
      - "frontend/**"
  workflow_dispatch:

jobs:
  hygiene:
    name: Dead code (madge + knip)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Dependências circulares (madge)
        run: npm run deadcode

      - name: Código/deps não usados (knip) — report-only
        continue-on-error: true
        run: npm run knip
