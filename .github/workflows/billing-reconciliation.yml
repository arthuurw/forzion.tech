name: Billing Reconciliation

on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:
    inputs:
      desde_utc:
        description: 'ISO-8601 UTC timestamp (ex: 2026-05-22T00:00:00Z). Vazio = últimos 7 dias.'
        required: false
        default: ''

permissions:
  contents: read
  issues: write

jobs:
  reconciliar:
    name: Reconciliar eventos Stripe
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: ${{ fromJSON(vars.CRON_ENVIRONMENTS || '["homolog"]') }}
    environment: ${{ matrix.env }}
    steps:
      - name: Conecta no tailnet
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4.1.2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          version: latest

      - name: Reconciliar pagamentos via Stripe Events.List
        env:
          DESDE_UTC: ${{ github.event.inputs.desde_utc }}
        run: |
          if [ -n "$DESDE_UTC" ]; then
            BODY="{\"desdeUtc\":\"$DESDE_UTC\"}"
          else
            BODY="{}"
          fi
          curl -f -X POST \
            --resolve "${{ vars.APP_HOST }}:443:${{ secrets.VM_TAILNET_IP }}" \
            -H "X-Internal-Key: ${{ secrets.INTERNAL_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            "https://${{ vars.APP_HOST }}/internal/reconciliar-pagamentos"

      - name: Notificar falha via issue
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `[billing-reconciliation] Falha em ${new Date().toISOString().slice(0, 10)}`;
            const body = [
              '⚠️ Workflow **Billing Reconciliation** falhou.',
              '',
              `**Run:** ${runUrl}`,
              `**Trigger:** ${context.eventName} (${context.ref})`,
              '',
              'Sem reconciliação = webhooks Stripe perdidos podem ficar não detectados (Pagamento.Status diverge do estado real).',
              '',
              'Investigar (ordem dos layers):',
              '1. Tailnet: runner conectou? ACL `tag:ci -> VM:443` liberada?',
              '2. `VM_TAILNET_IP` / `APP_HOST` (env) batem com a VM atual?',
              '3. Endpoint `/internal/reconciliar-pagamentos` respondeu (401=key, 5xx=backend)?',
              '4. Stripe API rate limit estourou (`stripe_request_quota_exceeded`)?',
              '5. Backend logs (`docker compose logs backend --tail 200`)',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ops', 'billing-reconciliation-failed']
            });
