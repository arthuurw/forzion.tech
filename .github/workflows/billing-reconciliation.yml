name: Billing Reconciliation

on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:
    inputs:
      desde_utc:
        description: 'ISO-8601 UTC timestamp (ex: 2026-05-22T00:00:00Z). Vazio = últimos 7 dias.'
        required: false
        default: ''

permissions:
  contents: read
  issues: write

jobs:
  reconciliar:
    name: Reconciliar eventos Stripe
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: ${{ fromJSON(vars.CRON_ENVIRONMENTS || '["homolog"]') }}
    environment: ${{ matrix.env }}
    steps:
      - name: Conecta no tailnet
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4.1.2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          version: latest

      - name: Reconciliar pagamentos via Stripe Events.List
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        env:
          DESDE_UTC: ${{ github.event.inputs.desde_utc }}
        with:
          host: ${{ secrets.VM_TAILNET_IP }}
          username: ubuntu
          key: ${{ secrets.HOMOLOG_SSH_KEY }}
          envs: DESDE_UTC
          script: |
            set -eu
            cd /opt/forzion/app
            EF=/opt/forzion/.env
            DC="docker compose -f docker-compose.homolog.yml --env-file $EF"
            KEY="$(grep -E '^INTERNAL_API_KEY=' "$EF" | head -1 | cut -d= -f2-)"
            if [ -n "${DESDE_UTC:-}" ]; then BODY="{\"desdeUtc\":\"$DESDE_UTC\"}"; else BODY="{}"; fi
            $DC exec -T backend curl -fsS -X POST \
              -H "X-Internal-Key: $KEY" -H "Content-Type: application/json" \
              -d "$BODY" \
              http://localhost:8080/internal/reconciliar-pagamentos

      - name: Notificar falha via issue
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `[billing-reconciliation] Falha em ${new Date().toISOString().slice(0, 10)}`;
            const body = [
              '⚠️ Workflow **Billing Reconciliation** falhou.',
              '',
              `**Run:** ${runUrl}`,
              `**Trigger:** ${context.eventName} (${context.ref})`,
              '',
              'Sem reconciliação = webhooks Stripe perdidos podem ficar não detectados (Pagamento.Status diverge do estado real).',
              '',
              'Investigar (ordem dos layers):',
              '1. Tailnet: runner conectou? ACL `tag:ci -> VM:22` (SSH) liberada?',
              '2. SSH: `VM_TAILNET_IP` bate com a VM? `HOMOLOG_SSH_KEY` válida?',
              '3. `docker compose exec backend` rodou? `/internal/reconciliar-pagamentos` respondeu (401=key, 5xx=backend)?',
              '4. Stripe API rate limit estourou (`stripe_request_quota_exceeded`)?',
              '5. Backend logs (`docker compose logs backend --tail 200`)',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ops', 'billing-reconciliation-failed']
            });
