name: OpenAPI drift (backend)

# Detecta drift do contrato OpenAPI: regenera o spec v1 a partir da app
# compilada (offline, sem subir Kestrel/DB — ver scripts/gen-openapi.sh) e
# compara com o arquivo versionado em docs/api/openapi.v1.json.
#
# Drift é o sinal desejado: ao mudar a API, regenere conscientemente com
# `bash scripts/gen-openapi.sh` e commite. Espelha o `openapi:check` do frontend.
# So em pull_request -> homolog: o drift e sinal de revisao pre-merge. NAO em
# push (merge ~= head do PR, repo solo) nem na branch `backend` (trigger morto)
# — re-rodar so queimaria minutos e nao gateia o deploy do ci.yml.
on:
  pull_request:
    branches: [homolog]
    paths-ignore: ["**.md", "docs/**", "specs/**"]
  workflow_dispatch:

# Roda só quando muda algo que afeta o contrato (Api/Application/Domain) ou o
# próprio spec/script. Evita gastar CI em PRs que só tocam frontend/docs.
concurrency:
  group: openapi-drift-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  openapi-drift:
    name: OpenAPI — drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build --no-restore -c Release

      - name: Regenera spec v1
        run: bash scripts/gen-openapi.sh docs/api/openapi.v1.json

      # Falha se o spec regenerado divergir do versionado (drift não coordenado).
      - name: Verifica drift do contrato
        run: |
          if ! git diff --exit-code --stat -- docs/api/openapi.v1.json; then
            echo "::error::Drift no contrato OpenAPI. Rode 'bash scripts/gen-openapi.sh' e commite docs/api/openapi.v1.json."
            git diff -- docs/api/openapi.v1.json | head -200
            exit 1
          fi
          echo "Contrato OpenAPI sincronizado."

      - name: Upload spec (artifact)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: openapi-v1
          path: docs/api/openapi.v1.json
          if-no-files-found: warn
