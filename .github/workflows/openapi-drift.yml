name: OpenAPI drift (backend)

# Detecta drift do contrato OpenAPI: regenera o swagger v1 a partir da app
# compilada (offline, sem subir Kestrel/DB — ver scripts/gen-swagger.sh) e
# compara com o arquivo versionado em docs/api/swagger.v1.json.
#
# Drift é o sinal desejado: ao mudar a API, regenere conscientemente com
# `bash scripts/gen-swagger.sh` e commite. Espelha o `openapi:check` do frontend.
on:
  push:
    branches: [homolog, backend]
  pull_request:
    branches: [homolog, backend]
  workflow_dispatch:

# Roda só quando muda algo que afeta o contrato (Api/Application/Domain) ou o
# próprio spec/script. Evita gastar CI em PRs que só tocam frontend/docs.
concurrency:
  group: openapi-drift-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  openapi-drift:
    name: OpenAPI — drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build --no-restore -c Release

      - name: Regenera swagger v1
        run: bash scripts/gen-swagger.sh docs/api/swagger.v1.json

      # Falha se o spec regenerado divergir do versionado (drift não coordenado).
      - name: Verifica drift do contrato
        run: |
          if ! git diff --exit-code --stat -- docs/api/swagger.v1.json; then
            echo "::error::Drift no contrato OpenAPI. Rode 'bash scripts/gen-swagger.sh' e commite docs/api/swagger.v1.json."
            git diff -- docs/api/swagger.v1.json | head -200
            exit 1
          fi
          echo "Contrato OpenAPI sincronizado."

      - name: Upload spec (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openapi-swagger-v1
          path: docs/api/swagger.v1.json
          if-no-files-found: warn
