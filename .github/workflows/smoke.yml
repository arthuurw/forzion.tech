name: Smoke E2E (pós-deploy homolog)

# Roda smokes Playwright contra a URL homolog após um deploy bem-sucedido,
# ou manualmente. No-op quando a variável HOMOLOG_BASE_URL não está definida.
on:
  workflow_run:
    workflows: ["CI / CD — Homolog"]
    types: [completed]
    branches: [homolog]
  workflow_dispatch:
    inputs:
      only_setup:
        description: "Roda só o project setup (valida login + geração de storage state)"
        type: boolean
        default: false

jobs:
  smoke:
    name: Smoke @smoke
    runs-on: ubuntu-latest
    environment: homolog
    if: >
      (github.event_name == 'workflow_dispatch' ||
       github.event.workflow_run.conclusion == 'success') &&
      vars.HOMOLOG_BASE_URL != ''
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Install Playwright browsers
        run: npm run e2e:install

      - name: Wait for homolog readiness
        env:
          BASE_URL: ${{ vars.HOMOLOG_BASE_URL }}
        run: |
          for i in $(seq 1 24); do
            code=$(curl -s -o /dev/null -w "%{http_code}" -m 10 "$BASE_URL/api/backend/health/ready" || echo 000)
            if [ "$code" = "200" ]; then echo "ready após ${i} tentativa(s)"; exit 0; fi
            echo "tentativa $i: $code — aguardando readiness..."
            sleep 5
          done
          echo "API homolog não ficou ready em ~120s"; exit 1

      - name: Smoke
        env:
          SMOKE_ONLY_SETUP: ${{ inputs.only_setup }}
          E2E_BASE_URL: ${{ vars.HOMOLOG_BASE_URL }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_ALUNO_EMAIL: ${{ secrets.E2E_ALUNO_EMAIL }}
          E2E_ALUNO_PASSWORD: ${{ secrets.E2E_ALUNO_PASSWORD }}
          E2E_TREINADOR_EMAIL: ${{ secrets.E2E_TREINADOR_EMAIL }}
          E2E_TREINADOR_PASSWORD: ${{ secrets.E2E_TREINADOR_PASSWORD }}
          E2E_TREINADOR_ID: ${{ vars.E2E_TREINADOR_ID }}
          E2E_PACOTE_ID: ${{ vars.E2E_PACOTE_ID }}
        run: |
          if [ "$SMOKE_ONLY_SETUP" = "true" ]; then
            npx playwright test --project=setup
          else
            npm run e2e:smoke
          fi

      - name: Sweep test data (homolog)
        if: always()
        env:
          E2E_BASE_URL: ${{ vars.HOMOLOG_BASE_URL }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_ALUNO_EMAIL: ${{ secrets.E2E_ALUNO_EMAIL }}
          E2E_TREINADOR_EMAIL: ${{ secrets.E2E_TREINADOR_EMAIL }}
          E2E_RESET_EMAIL: ${{ secrets.E2E_RESET_EMAIL }}
        run: npm run e2e:sweep

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-smoke-report
          path: frontend/playwright-report/
          if-no-files-found: warn
