name: Reconciliar NFS-e

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  reconciliar:
    name: Reconciliar NFS-e não-terminais com o gov
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: ${{ fromJSON(vars.CRON_ENVIRONMENTS || '["homolog"]') }}
    environment: ${{ matrix.env }}
    steps:
      - name: Conecta no tailnet
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4.1.2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          version: latest

      - name: Reconciliar NFS-e
        run: |
          curl -f -X POST \
            --resolve "${{ vars.APP_HOST }}:443:${{ secrets.VM_TAILNET_IP }}" \
            -H "X-Internal-Key: ${{ secrets.INTERNAL_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://${{ vars.APP_HOST }}/internal/reconciliar-nfse"

      - name: Notificar falha via issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `[reconciliar-nfse] Falha em ${new Date().toISOString().slice(0, 10)}`;
            const body = [
              '⚠️ Workflow **Reconciliar NFS-e** falhou.',
              '',
              `**Run:** ${runUrl}`,
              `**Trigger:** ${context.eventName} (${context.ref})`,
              '',
              'Sem reconciliação = NFS-e não-terminais podem divergir do estado real no gov (cancelamento confirmado, emissão tardia).',
              '',
              'Investigar (ordem dos layers):',
              '1. Tailnet: runner conectou? ACL `tag:ci -> VM:443` liberada?',
              '2. `VM_TAILNET_IP` / `APP_HOST` (env) batem com a VM atual?',
              '3. Endpoint `/internal/reconciliar-nfse` respondeu (401=key, 5xx=backend)?',
              '4. Backend logs (`docker compose logs backend --tail 200`)',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ops', 'reconciliar-nfse-failed']
            });
