name: Mutation testing (Stryker)

# Custo alto (cada mutante reroda subset de testes) — não roda em PR.
# Semanal + manual.
on:
  schedule:
    # Segunda 04:00 UTC.
    - cron: "0 4 * * 1"
  workflow_dispatch:

jobs:
  stryker:
    name: Stryker — lib + hooks (frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Stryker run
        run: npm run test:mutation

      - name: Upload mutation report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: mutation-report
          path: frontend/reports/mutation/
          if-no-files-found: warn

  # Mutation .NET (Stryker). Caro: cada mutante reroda subset da suíte. Por isso
  # NUNCA roda em PR — só schedule/manual (mesmo gatilho do job frontend acima).
  # Matriz por projeto: Domain e Application. O `break` do stryker-config.json
  # (40) faz o run falhar abaixo do piso; calibrado contra o score atual
  # (Application ~46% é o piso, Domain ~82%).
  stryker-backend:
    name: Stryker — backend (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - forzion.tech.Domain/forzion.tech.Domain.csproj
          - forzion.tech.Application/forzion.tech.Application.csproj
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore tools (dotnet-tools.json — stryker pinado)
        run: dotnet tool restore

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      # `--project` sobrescreve o `project` default do stryker-config.json,
      # permitindo cobrir Domain e Application com a mesma config (e o mesmo
      # `break`). Sai != 0 se o score ficar abaixo do break.
      - name: Stryker run (${{ matrix.project }})
        run: dotnet stryker --solution forzion.tech.slnx --project ${{ matrix.project }}

      - name: Slug do projeto (nome do artifact)
        if: always()
        id: slug
        run: echo "value=$(echo '${{ matrix.project }}' | sed 's#/.*##')" >> "$GITHUB_OUTPUT"

      - name: Upload mutation report (backend)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: mutation-report-backend-${{ steps.slug.outputs.value }}
          path: StrykerOutput/**/reports/
          if-no-files-found: warn
