name: Pact — provider verification (backend)

# Re-verifica a API .NET (provider forzion-api) contra o ultimo contrato
# publicado no broker, FORA do fluxo de deploy.
#
# A verificacao do push -> homolog NAO vive aqui: roda em ci.yml, no job
# pact-provider-verify `needs: deploy-homolog`, DEPOIS do deploy (ordem de
# publicacao consumer->provider). Aqui ficam so os disparos que NAO correm o
# deploy: cron semanal (drift se o broker mudou sem deploy) e disparo manual.
#
# Projeto isolado (forzion.tech.PactVerification) — nao faz parte da solution,
# entao o gate de PR nao o builda. Sem broker, o teste e no-op.
on:
  workflow_dispatch:
  schedule:
    # Terca 05:00 UTC — re-verifica contra o ultimo contrato publicado.
    - cron: "0 5 * * 2"

jobs:
  verify:
    name: Provider verification
    runs-on: ubuntu-latest
    environment: homolog
    # secrets nao podem ser usados em `if:`; mapeia p/ env do job e checa o env.
    env:
      PACT_BROKER_BASE_URL: ${{ secrets.PACT_BROKER_BASE_URL }}
      PACT_BROKER_USERNAME: ${{ secrets.PACT_BROKER_USERNAME }}
      PACT_BROKER_PASSWORD: ${{ secrets.PACT_BROKER_PASSWORD }}
      VM_TAILNET_IP: ${{ secrets.VM_TAILNET_IP }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: "10.0.x"

      # INVARIANTE: broker alcançado SÓ via tailnet (borda pública dropa o IP do
      # runner — mesmo motivo do SSH do deploy). Detalhe em ci.yml grupo PACT e
      # specs/specification-local-ci-repro.md (§Pact broker rota).
      - name: Conecta no tailnet
        if: ${{ env.PACT_BROKER_BASE_URL != '' }}
        uses: tailscale/github-action@780049a30b6ff5c378a9e7b389d15ece7a204888 # v4.1.3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          version: latest

      - name: Resolve broker via tailnet
        if: ${{ env.PACT_BROKER_BASE_URL != '' }}
        run: |
          BROKER_HOST="$(printf '%s' "$PACT_BROKER_BASE_URL" | sed -E 's#^https?://##; s#/.*$##')"
          echo "$VM_TAILNET_IP $BROKER_HOST" | sudo tee -a /etc/hosts

      - name: Aguarda broker disponivel
        # Rede de seguranca: o broker pode estar reiniciando. curl --max-time falha rapido.
        if: ${{ env.PACT_BROKER_BASE_URL != '' }}
        run: |
          for i in $(seq 1 12); do
            if curl -fsS --connect-timeout 10 --max-time 20 -u "$PACT_BROKER_USERNAME:$PACT_BROKER_PASSWORD" \
              "$PACT_BROKER_BASE_URL/diagnostic/status/heartbeat" >/dev/null; then
              echo "broker ok"; exit 0
            fi
            echo "broker indisponivel (deploy/restart?), retry $i/12..."; sleep 15
          done
          echo "broker nao respondeu apos 12 tentativas"; exit 1

      - name: Verifica contratos (provider)
        run: dotnet test forzion.tech.PactVerification/forzion.tech.PactVerification.csproj -c Release --nologo
        env:
          CI: "true"
          GITHUB_SHA: ${{ github.sha }}
