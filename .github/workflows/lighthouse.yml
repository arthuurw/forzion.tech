name: Lighthouse CI (semanal + manual)

# Performance/a11y/SEO contra a URL homolog. Schedule semanal (Quarta 06:00 UTC)
# pra capturar regressao de performance — budgets em lighthouserc.json (LCP <
# 2.5s, CLS < 0.1, TBT < 300ms). Manual via workflow_dispatch pra runs ad-hoc.
on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "URL base (default: variável HOMOLOG_BASE_URL)"
        required: false
        default: ""
  schedule:
    # F21 (Fase 5): Quarta 06:00 UTC. Sem auto-deploy nesse horario, baseline
    # representa o estado pos-deploys da terca (push homolog).
    - cron: "0 6 * * 3"

jobs:
  lighthouse:
    name: lhci — páginas públicas
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Resolve base URL
        id: url
        env:
          INPUT_URL: ${{ github.event.inputs.base_url }}
          VAR_URL: ${{ vars.HOMOLOG_BASE_URL }}
        run: |
          BASE="$INPUT_URL"
          if [ -z "$BASE" ]; then BASE="$VAR_URL"; fi
          if [ -z "$BASE" ]; then
            echo "Sem base_url e sem HOMOLOG_BASE_URL — abortando."
            exit 1
          fi
          echo "base=$BASE" >> "$GITHUB_OUTPUT"

      - name: Lighthouse (páginas públicas)
        env:
          BASE: ${{ steps.url.outputs.base }}
        run: |
          npx lhci collect \
            --url="$BASE/login" \
            --url="$BASE/cadastro/aluno" \
            --url="$BASE/cadastro/treinador"
          npx lhci assert

      - name: Upload lhci report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-report
          path: frontend/.lighthouseci/
          if-no-files-found: warn
