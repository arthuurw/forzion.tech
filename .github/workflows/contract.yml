name: Contract — Pact (consumer)

# Gate de PR do contrato consumer-driven (forzion-frontend), SEM broker:
# - pull_request: gera + valida o pact + verifica o provider .NET via file-source
#   (shift-left — pega quebra de contrato ANTES do merge). NAO toca o broker.
# - workflow_dispatch: idem, manual.
#
# O publish no broker e a verificacao broker do provider NAO vivem mais aqui:
# em push -> homolog ambos batem na MESMA VM/nginx do app e, durante o deploy
# (build + restart nginx), a 443 fica inalcancavel (race -> falso-vermelho).
# Migraram para ci.yml, em jobs `needs: deploy-homolog` que rodam DEPOIS do
# deploy, com o broker estavel.
# (workflow_run nao resolveria: le o workflow do branch default `main`, onde
#  este arquivo nao existe.)

on:
  pull_request:
    branches: [homolog]
    paths:
      - "frontend/src/lib/api/**"
      - "frontend/src/test/pact/**"
      - "frontend/vitest.pact.config.mts"
      - "frontend/pact-broker.config.ts"
      - ".github/workflows/contract.yml"
      # O job provider-contract verifica o backend .NET contra o pact no PR;
      # precisa disparar quando o provider muda (nao so o consumer frontend).
      - "forzion.tech.Api/**"
      - "forzion.tech.Application/**"
      - "forzion.tech.PactVerification/**"
  workflow_dispatch:

jobs:
  consumer-contract:
    name: Consumer contract (gera + valida — gate de PR)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Gera + valida contrato consumer
        run: npm run test:contract

      - name: Upload pact (artifact)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: pacts
          path: frontend/pacts/*.json
          if-no-files-found: error

  provider-contract:
    name: Provider contract (file-source, gate de PR)
    # Shift-left: verifica o provider .NET contra o pact gerado pelo consumer
    # neste run, via file-source, SEM broker. Pega quebra de contrato do backend
    # ANTES do merge (a verificacao broker em ci.yml so roda pos-deploy, no push).
    needs: consumer-contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: "10.0.x"

      - name: Baixa pact gerado pelo consumer
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: pacts
          path: frontend/pacts/

      - name: Verifica provider contra o pact file
        # SEM PACT_BROKER_* e SEM environment: homolog -> creds do broker nao
        # expostas no PR; o caminho broker do teste e no-op, roda so o file-source.
        run: dotnet test forzion.tech.PactVerification/forzion.tech.PactVerification.csproj -c Release --nologo
        env:
          PACT_FILE: ${{ github.workspace }}/frontend/pacts/forzion-frontend-forzion-api.json
