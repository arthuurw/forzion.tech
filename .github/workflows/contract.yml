name: Contract — Pact (consumer)

# Gera e valida o contrato consumer-driven do frontend (forzion-frontend).
# - pull_request: gera + valida (gate). NAO toca o broker.
# - push (homolog): gera + valida + publica no broker.
# - workflow_dispatch: disparo manual (publica).
#
# O broker (pact.homologacao.forzion.tech) vive no VM homolog e nem sempre e
# alcancavel dos runners GitHub. Por isso publish/can-i-deploy rodam SO em
# push/dispatch — em PR seriam dependencia externa flaky que derruba o gate sem
# relacao com o contrato. `environment: homolog` expoe os secrets tambem em PR,
# entao o guard e o EVENTO (github.event_name), nao a presenca do secret.
#
# Nota: o publish espera o broker responder (heartbeat) antes de subir o pact.
# Em push, o deploy homolog roda em paralelo e reinicia o nginx; o wait evita
# que o publish falhe ao bater no broker durante esse restart.
# (workflow_run nao serve aqui: ele le o workflow do branch default `main`, onde
#  este arquivo nao existe — entao nunca dispararia.)
#
# A verificacao do PROVIDER (backend .NET) NAO esta aqui: roda no pipeline do
# backend com o pact-verifier .NET, consumindo o contrato publicado no broker.

on:
  push:
    branches: [homolog]
    paths:
      - "frontend/src/lib/api/**"
      - "frontend/src/test/pact/**"
      - "frontend/vitest.pact.config.mts"
      - "frontend/pact-broker.config.ts"
      - ".github/workflows/contract.yml"
  pull_request:
    branches: [homolog]
    paths:
      - "frontend/src/lib/api/**"
      - "frontend/src/test/pact/**"
      - "frontend/vitest.pact.config.mts"
      - "frontend/pact-broker.config.ts"
      - ".github/workflows/contract.yml"
  workflow_dispatch:

jobs:
  consumer-contract:
    name: Consumer contract (gera + valida + publica)
    runs-on: ubuntu-latest
    # Os secrets PACT_BROKER_* vivem no Environment `homolog` — sem isto o job
    # nao os enxerga e o publish e skipado.
    environment: homolog
    # secrets nao podem ser usados em `if:`; mapeia p/ env do job e checa o env.
    env:
      PACT_BROKER_BASE_URL: ${{ secrets.PACT_BROKER_BASE_URL }}
      PACT_BROKER_USERNAME: ${{ secrets.PACT_BROKER_USERNAME }}
      PACT_BROKER_PASSWORD: ${{ secrets.PACT_BROKER_PASSWORD }}
      PACT_CONSUMER_VERSION: ${{ github.sha }}
      PACT_CONSUMER_BRANCH: ${{ github.ref_name }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Gera + valida contrato consumer
        run: npm run test:contract

      - name: Upload pact (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: pacts
          path: frontend/pacts/*.json
          if-no-files-found: error

      - name: Aguarda broker disponivel
        # Em push, o deploy reinicia o nginx em paralelo; espera o heartbeat
        # responder antes de publicar (evita falha por race com o restart).
        # So em push/dispatch — o broker nao e dependencia do gate de PR.
        if: ${{ github.event_name != 'pull_request' && env.PACT_BROKER_BASE_URL != '' }}
        run: |
          for i in $(seq 1 12); do
            if curl -fsS -u "$PACT_BROKER_USERNAME:$PACT_BROKER_PASSWORD" \
              "$PACT_BROKER_BASE_URL/diagnostic/status/heartbeat" >/dev/null; then
              echo "broker ok"; exit 0
            fi
            echo "broker indisponivel (deploy/restart?), retry $i/12..."; sleep 15
          done
          echo "broker nao respondeu apos ~3min"; exit 1

      - name: Publica no broker
        if: ${{ github.event_name != 'pull_request' && env.PACT_BROKER_BASE_URL != '' }}
        run: |
          docker run --rm \
            -v "$PWD/pacts:/pacts" \
            -e PACT_BROKER_BASE_URL -e PACT_BROKER_USERNAME -e PACT_BROKER_PASSWORD \
            pactfoundation/pact-cli:latest \
            publish /pacts \
            --consumer-app-version="${PACT_CONSUMER_VERSION}" \
            --branch="${PACT_CONSUMER_BRANCH}"

      - name: can-i-deploy (consumer)
        if: ${{ github.event_name != 'pull_request' && env.PACT_BROKER_BASE_URL != '' }}
        # Report-only ate o provider (backend .NET) verificar os contratos e
        # registrar deploy no environment homolog. Sem verificacao, o broker
        # corretamente responde "no" — nao deve derrubar a workflow ainda.
        continue-on-error: true
        run: |
          docker run --rm \
            -e PACT_BROKER_BASE_URL -e PACT_BROKER_USERNAME -e PACT_BROKER_PASSWORD \
            pactfoundation/pact-cli:latest \
            broker can-i-deploy \
            --pacticipant=forzion-frontend \
            --version="${PACT_CONSUMER_VERSION}" \
            --to-environment=homolog
