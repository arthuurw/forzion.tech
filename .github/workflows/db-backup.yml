name: DB Backup

# Dump lógico diário do Postgres (Supabase Free = SEM backup gerenciado → este workflow É o backup).
# pg_dump -Fc → criptografa com age (chave PÚBLICA; privada fica offline com o dono) → upload R2 off-site.
# Conexão pelo Session pooler (:5432, IPv4): runner do GitHub não tem rota IPv6 p/ o host direto, e
# pg_dump exige sessão (Transaction :6543 não serve).
# Dumpa homolog (staging, canônico hoje) + public (produção, PREPARADO): prod e staging vivem na
# MESMA DB Supabase, só muda o schema → 1 dump cobre os 2, independente de qual branch é default.
# Restore: ver specs/specification-dr.md §2.

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: db-backup
  cancel-in-progress: false

jobs:
  backup:
    name: pg_dump -> age -> R2
    runs-on: ubuntu-latest
    env:
      # homolog=staging (canônico hoje) + public=produção (PREPARADO). MESMA DB → 1 dump cobre ambos.
      BACKUP_SCHEMAS: homolog public
    steps:
      - name: Instalar pg_dump 17 + age
        run: |
          set -euo pipefail
          # client < 17 NÃO dumpa server 17.x; pgdg garante o major 17 exato.
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-17 age
          echo "PGDUMP=/usr/lib/postgresql/17/bin/pg_dump" >> "$GITHUB_ENV"
          /usr/lib/postgresql/17/bin/pg_dump --version
          age --version

      - name: Dump + criptografar + upload R2
        env:
          BACKUP_DATABASE_URL: ${{ secrets.BACKUP_DATABASE_URL }}
          BACKUP_AGE_PUBLIC_KEY: ${{ secrets.BACKUP_AGE_PUBLIC_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          # R2 rejeita os checksums novos default do aws-cli v2 → só calcular quando exigido.
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
          AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          set -euo pipefail
          STAMP="$(date -u +%Y%m%dT%H%M%SZ)"
          FILE="forzion-db-${STAMP}.dump"

          # BKP-01: o dump em claro (PII/LGPD, repo público) não pode sobreviver a NENHUMA saída
          # — falha do age/aws ou do size-guard. O trap remove claro + .age em qualquer exit.
          trap 'rm -f "${FILE}" "${FILE}.age"' EXIT

          # BKP-02: senha fora do process list. A URI posicional apareceria em ps/argv do pg_dump;
          # tira a senha p/ PGPASSWORD e passa a URI sem-senha (host/porta/user/db/params intactos).
          # BKP-03: parse via urlsplit (python3 -c; ubuntu-latest sempre tem). A senha vai
          # URL-DECODADA pro PGPASSWORD — libpq decoda a senha quando vem na URI mas usa PGPASSWORD
          # literal, então senha percent-encoded (%40, %2F...) precisa ser decodada aqui ou a auth
          # falha. SAFE_URL mantém o user-info encodado (libpq decoda a URI) e sem senha (BKP-02);
          # URI sem senha → password None → PGPASSWORD vazio (não vira a URI inteira como no sed).
          PGPASSWORD="$(python3 -c 'import os,urllib.parse as p; u=p.urlsplit(os.environ["BACKUP_DATABASE_URL"]); print(p.unquote(u.password) if u.password is not None else "")')"
          SAFE_URL="$(python3 -c 'import os,urllib.parse as p; u=p.urlsplit(os.environ["BACKUP_DATABASE_URL"]); netloc=((u.username+"@") if u.username is not None else "")+(u.hostname or "")+((":"+str(u.port)) if u.port else ""); print(p.urlunsplit((u.scheme,netloc,u.path,u.query,u.fragment)))')"
          export PGPASSWORD

          read -ra SCHEMAS <<< "${BACKUP_SCHEMAS}"
          SCHEMA_ARGS=()
          for s in "${SCHEMAS[@]}"; do SCHEMA_ARGS+=("--schema=${s}"); done
          "${PGDUMP}" "${SAFE_URL}" "${SCHEMA_ARGS[@]}" -Fc -f "${FILE}"

          # dump minúsculo = falha silenciosa do pg_dump; aborta antes de subir lixo + disparar alerta.
          SIZE=$(stat -c%s "${FILE}")
          echo "dump size = ${SIZE} bytes"
          if [ "${SIZE}" -lt 1000 ]; then
            echo "Dump suspeito (<1KB). Abortando."
            exit 1
          fi

          # criptografa p/ a chave pública; o dump em claro (PII/LGPD) nunca persiste no runner.
          age -r "${BACKUP_AGE_PUBLIC_KEY}" -o "${FILE}.age" "${FILE}"
          rm -f "${FILE}"

          aws s3 cp "${FILE}.age" "s3://${R2_BUCKET}/${FILE}.age" \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            --only-show-errors
          echo "backup enviado: s3://${R2_BUCKET}/${FILE}.age (${SIZE} bytes em claro)"

      - name: Notificar falha via issue
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `[db-backup] Falha em ${new Date().toISOString().slice(0, 10)}`;
            const body = [
              '⚠️ Workflow **DB Backup** falhou — backup do dia NÃO foi gerado.',
              '',
              `**Run:** ${runUrl}`,
              `**Trigger:** ${context.eventName} (${context.ref})`,
              '',
              'Sem backup hoje = janela de perda de dado aumenta (RPO degrada).',
              '',
              'Investigar:',
              '1. `BACKUP_DATABASE_URL` válido? (Session pooler :5432, user `forzion_api.<ref>`)',
              '2. Credenciais R2 (`R2_*`) e bucket corretos?',
              '3. `BACKUP_AGE_PUBLIC_KEY` setado?',
              '4. Logs do run acima.',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ops', 'db-backup-failed']
            });
