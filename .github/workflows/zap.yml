name: ZAP DAST (baseline passivo + full autenticado)

# baseline: action-baseline, passivo, anônimo, rápido.
# full: Automation Framework (zap.yaml) autenticado — spider+active scan pós-login.
#   active scan é LENTO (~30 min) e injeta payload: rodar só manual ou schedule esparso.
on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "URL alvo (default: variável HOMOLOG_BASE_URL)"
        required: false
        default: ""
      mode:
        description: "Modo: baseline (rapido, passivo) ou full (autenticado, active)"
        required: false
        default: "baseline"
        type: choice
        options:
          - baseline
          - full
  schedule:
    - cron: "0 2 * * 5"

permissions:
  contents: read
  issues: write

jobs:
  zap:
    name: ZAP ${{ github.event.inputs.mode || 'baseline' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Resolve target
        id: t
        env:
          INPUT_URL: ${{ github.event.inputs.target_url }}
          VAR_URL: ${{ vars.HOMOLOG_BASE_URL }}
        run: |
          T="$INPUT_URL"
          if [ -z "$T" ]; then T="$VAR_URL"; fi
          if [ -z "$T" ]; then
            echo "Sem target_url e sem HOMOLOG_BASE_URL — abortando."
            exit 1
          fi
          echo "target=$T" >> "$GITHUB_OUTPUT"

      - name: ZAP Baseline Scan (passivo)
        if: ${{ github.event.inputs.mode != 'full' }}
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: ${{ steps.t.outputs.target }}
          cmd_options: "-a"
          allow_issue_writing: false

      - name: ZAP Full Scan (autenticado, Automation Framework)
        if: ${{ github.event.inputs.mode == 'full' }}
        env:
          ZAP_AUTH_USER: ${{ secrets.ZAP_AUTH_USER }}
          ZAP_AUTH_PASSWORD: ${{ secrets.ZAP_AUTH_PASSWORD }}
        run: |
          if [ -z "$ZAP_AUTH_USER" ] || [ -z "$ZAP_AUTH_PASSWORD" ]; then
            echo "::error::Modo full exige secrets ZAP_AUTH_USER e ZAP_AUTH_PASSWORD (conta dedicada de teste)."
            exit 1
          fi
          mkdir -p zap-report
          docker run --rm \
            -v "$PWD:/zap/wrk:rw" \
            -e ZAP_AUTH_USER -e ZAP_AUTH_PASSWORD \
            ghcr.io/zaproxy/zaproxy:stable \
            zap.sh -cmd -autorun /zap/wrk/zap.yaml

      - name: Upload relatório ZAP
        if: ${{ always() && github.event.inputs.mode == 'full' }}
        uses: actions/upload-artifact@v7
        with:
          name: zap-report
          path: zap-report/
          if-no-files-found: warn
