name: ZAP DAST (baseline + active rules — F22)

# Varredura DAST contra a URL homolog. Manual (precisa de stack viva). Inclui:
#   - baseline passivo (headers/cookies/CSP)
#   - full scan com active rules: SQLi, XSS, path traversal, command injection
# F22 (Fase 5): expandido de baseline-only pra Automation Framework via
# action-full-scan. Active scan e LENTO (~30 min); rodar so manual ou sob
# schedule esparso.
on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "URL alvo (default: variável HOMOLOG_BASE_URL)"
        required: false
        default: ""
      mode:
        description: "Modo: baseline (rapido, passivo) ou full (active rules)"
        required: false
        default: "baseline"
        type: choice
        options:
          - baseline
          - full
  schedule:
    # Sexta 02:00 UTC — antes do fim de semana; janela longa pra full scan
    # eventualmente trocar pra full sem impactar weekday dev.
    - cron: "0 2 * * 5"

permissions:
  contents: read
  issues: write

jobs:
  zap:
    name: ZAP ${{ github.event.inputs.mode || 'baseline' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve target
        id: t
        env:
          INPUT_URL: ${{ github.event.inputs.target_url }}
          VAR_URL: ${{ vars.HOMOLOG_BASE_URL }}
        run: |
          T="$INPUT_URL"
          if [ -z "$T" ]; then T="$VAR_URL"; fi
          if [ -z "$T" ]; then
            echo "Sem target_url e sem HOMOLOG_BASE_URL — abortando."
            exit 1
          fi
          echo "target=$T" >> "$GITHUB_OUTPUT"

      - name: ZAP Baseline Scan (passivo)
        if: ${{ github.event.inputs.mode != 'full' }}
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ steps.t.outputs.target }}
          cmd_options: "-a"
          allow_issue_writing: false

      # F22 — full scan com active rules. SQLi/XSS/path-traversal/CMDi.
      # action-full-scan usa ZAP -A modo ativo + ataques estilo OWASP top 10.
      # Pode demorar ~30 min — rodar so quando necessario.
      - name: ZAP Full Scan (active rules)
        if: ${{ github.event.inputs.mode == 'full' }}
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: ${{ steps.t.outputs.target }}
          cmd_options: "-a"
          allow_issue_writing: false
