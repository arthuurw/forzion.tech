name: ZAP DAST baseline (manual)

# Varredura DAST baseline contra a URL homolog. Manual (precisa de stack viva).
on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "URL alvo (default: variável HOMOLOG_BASE_URL)"
        required: false
        default: ""

permissions:
  contents: read
  issues: write

jobs:
  zap-baseline:
    name: ZAP baseline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve target
        id: t
        run: |
          T="${{ github.event.inputs.target_url }}"
          if [ -z "$T" ]; then T="${{ vars.HOMOLOG_BASE_URL }}"; fi
          if [ -z "$T" ]; then
            echo "Sem target_url e sem HOMOLOG_BASE_URL — abortando."
            exit 1
          fi
          echo "target=$T" >> "$GITHUB_OUTPUT"

      # Baseline passivo (sem ataque ativo). O zap.yaml (Automation Framework)
      # pode ser wired via zaproxy/action-af numa fase futura para um scan mais
      # completo; aqui um baseline simples já cobre headers/cookies/CSP.
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ steps.t.outputs.target }}
          cmd_options: "-a"
          allow_issue_writing: false
