name: Gerar NFS-e Comissão

on:
  schedule:
    - cron: '0 9 2 * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  gerar:
    name: Gerar NFS-e mensal de comissão (mês anterior)
    runs-on: ubuntu-latest
    environment: homolog
    steps:
      - name: Conecta no tailnet
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4.1.2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          version: latest

      - name: Gerar NFS-e de comissão
        run: |
          curl -f -X POST \
            -H "X-Internal-Key: ${{ secrets.INTERNAL_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://${{ secrets.HOMOLOG_HOST }}/internal/gerar-nfse-comissao"

      - name: Notificar falha via issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `[gerar-nfse-comissao] Falha em ${new Date().toISOString().slice(0, 10)}`;
            const body = [
              '⚠️ Workflow **Gerar NFS-e Comissão** falhou.',
              '',
              `**Run:** ${runUrl}`,
              `**Trigger:** ${context.eventName} (${context.ref})`,
              '',
              'Sem geração hoje = NFS-e de comissão do mês anterior não enfileiradas.',
              '',
              'Investigar:',
              '1. Endpoint `/internal/gerar-nfse-comissao` respondeu?',
              '2. `INTERNAL_API_KEY` da VM bate com secret do environment?',
              '3. Backend logs (`docker compose logs backend --tail 200`)',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ops', 'gerar-nfse-comissao-failed']
            });
