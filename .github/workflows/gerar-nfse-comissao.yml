name: Gerar NFS-e Comissão

on:
  schedule:
    - cron: '0 9 2 * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  gerar:
    name: Gerar NFS-e mensal de comissão (mês anterior)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: ${{ fromJSON(vars.CRON_ENVIRONMENTS || '["homolog"]') }}
    environment: ${{ matrix.env }}
    steps:
      - name: Conecta no tailnet
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4.1.2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          version: latest

      - name: Gerar NFS-e de comissão
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        with:
          host: ${{ secrets.VM_TAILNET_IP }}
          username: ubuntu
          key: ${{ secrets.HOMOLOG_SSH_KEY }}
          script: |
            set -eu
            cd /opt/forzion/app
            EF=/opt/forzion/.env
            DC="docker compose -f ${{ vars.COMPOSE_FILE || 'docker-compose.homolog.yml' }} --env-file $EF"
            KEY="$(grep -E '^INTERNAL_API_KEY=' "$EF" | head -1 | cut -d= -f2-)"
            $DC exec -T backend curl -fsS -X POST \
              -H "X-Internal-Key: $KEY" -H "Content-Type: application/json" \
              http://localhost:8080/internal/gerar-nfse-comissao

      - name: Healthchecks ping (success)
        if: success()
        run: curl -fsS -m 10 --retry 3 "https://hc-ping.com/${{ secrets.HC_PING_KEY }}/gerar-nfse-comissao" || true
      - name: Healthchecks ping (failure)
        if: failure()
        run: curl -fsS -m 10 --retry 3 "https://hc-ping.com/${{ secrets.HC_PING_KEY }}/gerar-nfse-comissao/fail" || true

      - name: Notificar falha via issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `[gerar-nfse-comissao] Falha em ${new Date().toISOString().slice(0, 10)}`;
            const body = [
              '⚠️ Workflow **Gerar NFS-e Comissão** falhou.',
              '',
              `**Run:** ${runUrl}`,
              `**Trigger:** ${context.eventName} (${context.ref})`,
              '',
              'Sem geração hoje = NFS-e de comissão do mês anterior não enfileiradas.',
              '',
              'Investigar (ordem dos layers):',
              '1. Tailnet: runner conectou? ACL `tag:ci -> VM:22` (SSH) liberada?',
              '2. SSH: `VM_TAILNET_IP` bate com a VM? `HOMOLOG_SSH_KEY` válida?',
              '3. `docker compose exec backend` rodou? `/internal/gerar-nfse-comissao` respondeu (401=key, 5xx=backend)?',
              '4. Backend logs (`docker compose logs backend --tail 200`)',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ops', 'gerar-nfse-comissao-failed']
            });
