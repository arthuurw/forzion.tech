x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

# nginx+certbot compartilhados hmg+prd. Rede forzion-edge: externa, criada 1x
# (`docker network create forzion-edge`). Runbook de cutover: specs/specification-infrastructure.md §ISOLAMENTO-PRD-HMG.
services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    networks:
      - forzion-edge
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - /var/log/forzion-nginx:/var/log/nginx
    restart: unless-stopped
    logging: *default-logging

  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do
        certbot renew --webroot --webroot-path=/var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"
    restart: unless-stopped
    logging: *default-logging

networks:
  forzion-edge:
    external: true
