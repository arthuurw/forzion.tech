# Casa auth-fail (401) e rate-limit (429) no access_log nginx (formato combined).
# nginx é a borda → <HOST> = $remote_addr = IP real do cliente.
[Definition]
failregex = ^<HOST> -[^"]*"(?:GET|POST|PUT|DELETE) /api/auth\S* HTTP/[^"]*" (?:401|429)
            ^<HOST> -[^"]*"(?:GET|POST|PUT|DELETE) /api/backend/\S* HTTP/[^"]*" 429
datepattern = \[%d/%b/%Y:%H:%M:%S
ignoreregex =
