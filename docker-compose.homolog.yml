services:
  backend:
    build:
      context: .
      dockerfile: forzion.tech.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Homolog
      ConnectionStrings__AppConnection: ${DB_CONNECTION}
      Auth__JwtSecret: ${JWT_SECRET}
      Auth__JwtIssuer: ${JWT_ISSUER:-homologacao.forzion.tech}
      Auth__JwtAudience: ${JWT_AUDIENCE:-homologacao.forzion.tech}
      Cors__AllowedOrigins: ${CORS_ORIGINS:-https://homologacao.forzion.tech}
      Stripe__SecretKey: ${STRIPE_SECRET_KEY:-}
      Stripe__WebhookSecret: ${STRIPE_WEBHOOK_SECRET:-}
      Stripe__UrlBase: ${STRIPE_URL_BASE:-https://homologacao.forzion.tech}
      Resend__ApiKey: ${RESEND_API_KEY:-}
      Resend__WebhookSecret: ${RESEND_WEBHOOK_SECRET:-}
      Email__RedirecionarDestinatariosPara: ${EMAIL_REDIRECT_TO:-}
      Email__AllowlistDominios: ${EMAIL_ALLOWLIST_DOMAINS:-}
      App__FrontendBaseUrl: ${APP_FRONTEND_BASE_URL:-https://homologacao.forzion.tech}
      Internal__ApiKey: ${INTERNAL_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        CSP_REPORT_ONLY: "true"
    environment:
      NODE_ENV: production
      API_BASE_URL: http://backend:8080
      NEXT_PUBLIC_API_BASE_URL: /api/backend
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

  # ─── Pact Broker (contract testing self-hosted) ────────────────────────────
  # Postgres dedicado do broker (volume proprio, isolado do DB do app).
  pact-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${PACT_POSTGRES_USER:-pact}
      POSTGRES_PASSWORD: ${PACT_POSTGRES_PASSWORD}
      POSTGRES_DB: pact_broker
    volumes:
      - pact_pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PACT_POSTGRES_USER:-pact} -d pact_broker"]
      interval: 15s
      timeout: 5s
      retries: 5

  pact-broker:
    image: pactfoundation/pact-broker:latest
    environment:
      PACT_BROKER_DATABASE_ADAPTER: postgres
      PACT_BROKER_DATABASE_HOST: pact-postgres
      PACT_BROKER_DATABASE_NAME: pact_broker
      PACT_BROKER_DATABASE_USERNAME: ${PACT_POSTGRES_USER:-pact}
      PACT_BROKER_DATABASE_PASSWORD: ${PACT_POSTGRES_PASSWORD}
      PACT_BROKER_PORT: "9292"
      PACT_BROKER_BASE_URL: https://pact.homologacao.forzion.tech
      # Auth basica: CI publica/consulta com estas credenciais.
      PACT_BROKER_BASIC_AUTH_USERNAME: ${PACT_BROKER_USERNAME}
      PACT_BROKER_BASIC_AUTH_PASSWORD: ${PACT_BROKER_PASSWORD}
      PACT_BROKER_LOG_LEVEL: warn
    restart: unless-stopped
    depends_on:
      pact-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9292/diagnostic/status/heartbeat || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    restart: unless-stopped
    depends_on:
      - frontend

  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do
        certbot renew --webroot --webroot-path=/var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"
    restart: unless-stopped

volumes:
  pact_pgdata:
