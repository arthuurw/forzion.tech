events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    # Arquivo (não stdout): fail2ban no host taila este path via bind-mount.
    access_log /var/log/nginx/access.log combined;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Catch-all: host nao-explicito (ex: apex forzion.tech apontando pra esta VM)
    # cairia no PRIMEIRO server block (homolog) por ser o default implicito do nginx.
    # Este default_server intercepta antes e fecha a conexao (444), evitando vazar
    # homolog para dominios nao previstos. ssl_reject_handshake dispensa cert valido.
    server {
        listen 80  default_server;
        listen 443 ssl default_server;
        server_name _;
        ssl_reject_handshake on;
        return 444;
    }

    server {
        listen 80;
        server_name homologacao.forzion.tech;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name homologacao.forzion.tech;

        ssl_certificate     /etc/letsencrypt/live/homologacao.forzion.tech/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/homologacao.forzion.tech/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        # Homolog é host público: impede indexação por buscadores (staging não deve
        # competir/expor vs produção). Defesa em profundidade com robots.ts env-gated.
        # NÃO replicar no server block de produção (forzion.tech) quando ativado.
        add_header X-Robots-Tag "noindex, nofollow" always;

        # Webhooks (Resend/Svix) vao direto ao backend: precisam dos headers
        # crus svix-* para a verificacao de assinatura. O proxy da SPA
        # (/api/backend) descarta esses headers, entao webhooks nunca passam
        # por ele. Deve vir ANTES do `location /` (frontend).
        location /webhooks/ {
            proxy_pass         http://backend-hmg:8080;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # /internal/* nunca é alcançável pela borda: os crons batem nele via
        # `docker compose exec backend` dentro da VM, não por aqui. Antes de `location /`.
        location /internal/ {
            return 404;
        }

        location / {
            proxy_pass         http://frontend-hmg:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_connect_timeout 5s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }
    }

    # Produção: só :80 ativo (ACME+redirect). :443 fica comentado até a stack prd subir
    # (backend-prd/frontend-prd) — ver specification-infrastructure §DNS-PROD.
    server {
        listen 80;
        server_name forzion.tech www.forzion.tech app.forzion.tech;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            default_type text/plain;
            return 503 "forzion.tech: em provisionamento.";
        }
    }

    # SEM X-Robots-Tag noindex — prod DEVE ser indexável (ao contrário de homolog).
    # server {
    #     listen 443 ssl;
    #     http2 on;
    #     server_name forzion.tech www.forzion.tech app.forzion.tech;
    #
    #     ssl_certificate     /etc/letsencrypt/live/forzion.tech/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/forzion.tech/privkey.pem;
    #
    #     ssl_protocols       TLSv1.2 TLSv1.3;
