events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name homologacao.forzion.tech;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name homologacao.forzion.tech;

        ssl_certificate     /etc/letsencrypt/live/homologacao.forzion.tech/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/homologacao.forzion.tech/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;

        # Swagger NAO e exposto publicamente: o backend so serve Swagger em
        # Development (local). Os tipos do harness frontend sao gerados de uma
        # instancia local via `npm run openapi:sync`.

        location / {
            proxy_pass         http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
    }

    # ─── Pact Broker (subdominio) ──────────────────────────────────────────
    # DNS: criar A record pact.homologacao.forzion.tech -> IP da VM.
    # Cert: expandir o cert existente p/ incluir este subdominio:
    #   certbot certonly --webroot -w /var/www/certbot \
    #     -d homologacao.forzion.tech -d pact.homologacao.forzion.tech --expand
    server {
        listen 80;
        server_name pact.homologacao.forzion.tech;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name pact.homologacao.forzion.tech;

        # Usa o cert do dominio principal ate o --expand acima rodar. Assim o
        # nginx sobe mesmo antes do cert do subdominio existir — o site
        # principal nunca cai. Apos expandir, o cert ja cobre os dois nomes.
        ssl_certificate     /etc/letsencrypt/live/homologacao.forzion.tech/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/homologacao.forzion.tech/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location / {
            proxy_pass         http://pact-broker:9292;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
