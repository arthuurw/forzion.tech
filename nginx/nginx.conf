events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    # Arquivo (não stdout): fail2ban no host taila este path via bind-mount.
    access_log /var/log/nginx/access.log combined;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # DNS do Docker: resolve hmg-*/prd-* em runtime (precisa de variável no
    # proxy_pass) — deploy recria o container sem exigir reload do nginx.
    resolver 127.0.0.11 valid=30s;

    # Catch-all: host nao-explicito (ex: apex/IP direto) cairia no PRIMEIRO
    # server block por ser o default implicito do nginx. Este default_server
    # intercepta antes e fecha a conexao (444), evitando vazar um vhost para
    # dominios nao previstos. ssl_reject_handshake dispensa cert valido.
    server {
        listen 80  default_server;
        listen 443 ssl default_server;
        server_name _;
        ssl_reject_handshake on;
        return 444;
    }

    # ─── Produção (forzion.tech / www / app) ───────────────────────────────
    server {
        listen 80;
        server_name forzion.tech www.forzion.tech app.forzion.tech;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name forzion.tech www.forzion.tech app.forzion.tech;

        ssl_certificate     /etc/letsencrypt/live/forzion.tech/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/forzion.tech/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;

        set $prd_backend  http://prd-backend:8080;
        set $prd_frontend http://prd-frontend:3000;

        # Webhooks (Stripe/Resend/Svix) vao direto ao backend: precisam dos
        # headers crus (stripe-signature, svix-*) para verificacao de
        # assinatura. O proxy da SPA (/api/backend) descarta esses headers.
        # Deve vir ANTES do `location /` (frontend).
        location /webhooks/ {
            proxy_pass         $prd_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        # /internal/* nunca é alcançável pela borda: os crons batem nele via
        # `docker compose exec backend` dentro da VM, não por aqui. Antes de `location /`.
        location /internal/ {
            return 404;
        }

        location / {
            proxy_pass         $prd_frontend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_connect_timeout 5s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }
    }

    # ─── Homolog (homologacao.forzion.tech) ────────────────────────────────
    server {
        listen 80;
        server_name homologacao.forzion.tech;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name homologacao.forzion.tech;

        ssl_certificate     /etc/letsencrypt/live/homologacao.forzion.tech/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/homologacao.forzion.tech/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        # Homolog é host público: impede indexação por buscadores (staging não deve
        # competir/expor vs produção). Defesa em profundidade com robots.ts env-gated.
        # NÃO replicar no server block de produção (forzion.tech) acima.
        add_header X-Robots-Tag "noindex, nofollow" always;

        set $hmg_backend  http://hmg-backend:8080;
        set $hmg_frontend http://hmg-frontend:3000;

        location /webhooks/ {
            proxy_pass         $hmg_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        location /internal/ {
            return 404;
        }

        location / {
            proxy_pass         $hmg_frontend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_connect_timeout 5s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }
    }

    # ─── Pact Broker (subdominio de homolog) ───────────────────────────────
    server {
        listen 80;
        server_name pact.homologacao.forzion.tech;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name pact.homologacao.forzion.tech;

        # Mesmo cert de homologacao.forzion.tech (--expand cobre este SAN).
        ssl_certificate     /etc/letsencrypt/live/homologacao.forzion.tech/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/homologacao.forzion.tech/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        set $hmg_pact_broker http://hmg-pact-broker:9292;

        location / {
            proxy_pass         $hmg_pact_broker;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
