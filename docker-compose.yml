services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: forzion
      POSTGRES_USER: forzion
      POSTGRES_PASSWORD: forzion_local
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Cria o schema `develop` no primeiro init (migrations são schema-agnostic e usam
      # Search Path=develop; sem o schema o backend falha com "no schema has been selected").
      - ./scripts/init-develop-schema.sql:/docker-entrypoint-initdb.d/init-develop-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forzion"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: forzion.tech.Api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__AppConnection: "Host=postgres;Port=5432;Database=forzion;Username=forzion;Password=forzion_local;Search Path=develop;"
      Auth__JwtSecret: "${JWT_SECRET}"
      Auth__JwtIssuer: "${JWT_ISSUER:-forzion.tech}"
      Auth__JwtAudience: "${JWT_AUDIENCE:-forzion.tech}"
      Mfa__EncryptionKey: "${MFA_ENCRYPTION_KEY}"
      Cors__AllowedOrigins: "http://localhost:3000"
      Stripe__SecretKey: "${STRIPE_SECRET_KEY}"
      Stripe__WebhookSecret: "${STRIPE_WEBHOOK_SECRET}"
      Stripe__PublishableKey: "${STRIPE_PUBLISHABLE_KEY:-}"
      Stripe__TaxaPlataformaPercent: "${STRIPE_TAXA_PLATAFORMA:-5}"
      Stripe__UrlBase: "${STRIPE_URL_BASE:-http://localhost:3000}"
      Resend__ApiKey: "${RESEND_API_KEY:-}"
      Email__RedirecionarDestinatariosPara: "${EMAIL_REDIRECT_TO:-}"
      Email__AllowlistDominios: "${EMAIL_ALLOWLIST_DOMAINS:-}"
      Internal__ApiKey: "${INTERNAL_API_KEY:-}"
      Seed__AdminEmail: "${SEED_ADMIN_EMAIL:-admin@forzion.tech}"
      Seed__AdminPassword: "${SEED_ADMIN_PASSWORD}"
      # WhatsApp via Meta Cloud API (opcional — NullWhatsAppNotifier se vazio)
      # WhatsApp__PhoneNumberId: "${WHATSAPP_PHONE_NUMBER_ID}"
      # WhatsApp__AccessToken: "${WHATSAPP_ACCESS_TOKEN}"
      # WhatsApp__ApiVersion: "${WHATSAPP_API_VERSION:-v21.0}"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8080 && echo -e \"GET /health HTTP/1.0\\r\\n\\r\\n\" >&3 && grep -q 200 <&3'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        API_BASE_URL: "http://backend:8080"
    ports:
      - "3001:3000"
    environment:
      API_BASE_URL: "http://backend:8080"
      NEXT_PUBLIC_API_BASE_URL: "/api/backend"
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: "${STRIPE_PUBLISHABLE_KEY:-}"
      # Mesmo segredo do backend (Auth__JwtSecret): /api/auth/me valida a assinatura do JWT.
      JWT_SECRET: "${JWT_SECRET}"
      JWT_ISSUER: "${JWT_ISSUER:-forzion.tech}"
      JWT_AUDIENCE: "${JWT_AUDIENCE:-forzion.tech}"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
